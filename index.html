<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국동시지방선거 개표현황 | KBS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#04060e;--panel:#070a14;--border:#10182a;--border2:#1a2540;--text:#c8d2e8;--sub:#6a7a9a;--dim:#323a52;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
#header{background:linear-gradient(90deg,#05091c,#07103a,#05091c);border-bottom:1px solid var(--border2);height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:relative;}
#header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#1a4acf 20%,#2a6aef 50%,#1a4acf 80%,transparent);}
.kbs-badge{background:linear-gradient(135deg,#1a3a9a,#2a5fd4);color:#fff;padding:3px 7px;border-radius:3px;font-size:11px;font-weight:900;letter-spacing:1.5px;margin-right:9px;flex-shrink:0;}
#header-title{font-size:14px;font-weight:700;}
#header-title span{color:#5a8ff5;}
#header-sub{font-size:10px;color:var(--sub);margin-top:1px;}
#live-badge{display:none;align-items:center;gap:5px;background:rgba(220,30,30,.12);border:1px solid rgba(220,30,30,.4);border-radius:3px;padding:3px 7px;margin-left:10px;}
#live-badge.on{display:flex;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#dc1e1e;animation:pulse 1s infinite;}
.live-text{font-size:11px;font-weight:900;color:#ef4444;letter-spacing:1px;}
.hbtn{background:rgba(20,32,60,.9);border:1px solid var(--border2);color:var(--sub);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;}
.hbtn:hover{border-color:#2a4a8a;color:var(--text);}
.hbtn.live-on{background:rgba(220,30,30,.18);border-color:rgba(220,30,30,.5);color:#ef4444;}

/* ── TABS ── */
#election-tabs{background:#050812;border-bottom:1px solid var(--border);height:38px;flex-shrink:0;display:flex;align-items:stretch;padding:0 14px;gap:2px;overflow-x:auto;}
#election-tabs::-webkit-scrollbar{display:none;}
.etab{display:flex;align-items:center;gap:6px;padding:0 14px;cursor:pointer;border-bottom:2px solid transparent;font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap;transition:all .15s;flex-shrink:0;}
.etab:hover{color:var(--text);}.etab.active{color:#5a9ff5;border-bottom-color:#2a6aef;}
.tab-badge{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;}
.tab-badge.done{background:rgba(50,100,200,.15);border:1px solid rgba(50,100,200,.3);color:#6a9af5;}
.tab-badge.upcoming{background:rgba(60,60,80,.2);border:1px solid var(--border2);color:var(--dim);}

/* ── SUMMARY ── */
#summary-bar{background:#060810;border-bottom:1px solid var(--border);height:42px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:14px;}
.sb-label{font-size:11px;color:var(--dim);font-weight:600;flex-shrink:0;}
.sb-div{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
#seat-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;flex:1;max-width:200px;min-width:60px;}
.seat-seg{height:100%;transition:width .5s;}
#party-chips{display:flex;gap:12px;flex-wrap:nowrap;}
.pchip{display:flex;align-items:center;gap:5px;}
.pdot{width:9px;height:9px;border-radius:2px;}.pcnt{font-size:14px;font-weight:900;}.pname{font-size:11px;color:var(--sub);}
.sb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
#data-src-badge{font-size:10px;padding:2px 7px;border-radius:3px;display:none;}
#data-src-badge.builtin{display:block;background:rgba(60,120,60,.15);border:1px solid rgba(80,140,80,.3);color:#6aaa6a;}
#data-src-badge.mock{display:block;background:rgba(80,80,80,.1);border:1px solid var(--border2);color:var(--dim);}
#data-src-badge.api{display:block;background:rgba(18,89,195,.15);border:1px solid rgba(18,89,195,.35);color:#6b9cf5;}
#avg-rate-lbl{font-size:12px;color:var(--sub);}#avg-rate-lbl b{color:#8a9ab8;}
#err-msg{font-size:11px;color:#f4924a;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);padding:2px 8px;border-radius:3px;display:none;}
#err-msg.show{display:block;}

/* ── MAIN ── */
#main{flex:1;display:flex;overflow:hidden;}
#map-area{flex:1;position:relative;overflow:hidden;}
#map-svg{width:100%;height:100%;}
#map-svg path{transition:opacity .2s, fill .2s;}

/* ── 뒤로가기 네비게이션 ── */
#drill-nav{display:none;position:absolute;top:14px;left:14px;z-index:20;}
.btn-nav-back{background:rgba(18,89,195,.8);border:1px solid #2a6aef;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;backdrop-filter:blur(6px);transition:all .15s;box-shadow:0 4px 12px rgba(0,0,0,.5);}
.btn-nav-back:hover{background:#2a6aef;transform:translateY(-1px);}

/* ── 맵 툴바 ── */
#map-toolbar{position:absolute;bottom:14px;left:14px;z-index:15;display:flex;flex-direction:column;gap:6px;}
.map-tbtn{background:rgba(4,6,14,.92);border:1px solid var(--border2);color:var(--sub);padding:6px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;backdrop-filter:blur(6px);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.map-tbtn:hover{border-color:#2a4a8a;color:var(--text);}
.map-tbtn.on{background:rgba(18,89,195,.2);border-color:#2a5fd4;color:#6a9ff5;}
.tool-row{display:flex;gap:5px; align-items:center;}
#lbl-chk{display:none;}

/* 배경 투명도 슬라이더 커스텀 */
input[type=range] { -webkit-appearance: none; width: 80px; background: transparent; margin: 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #6a9ff5; cursor: pointer; margin-top: -4px; }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border2); border-radius: 2px; }

/* ── 로딩 ── */
#loading-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(4,6,14,0.9);backdrop-filter:blur(4px);z-index:100;}
.spinner{width:30px;height:30px;border:3px solid #1a2a40;border-top-color:#3a5ad4;border-radius:50%;animation:spin .7s linear infinite;}
#loading-txt{font-size:13px;color:var(--sub);font-weight:600;}

/* ── 메인 지도 툴팁 ── */
#tooltip{position:absolute;pointer-events:none;z-index:25;min-width:180px;background:rgba(4,6,14,.97);border:1px solid var(--border2);border-radius:7px;padding:11px 13px;display:none;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,.75);}
#tooltip.on{display:block;}

/* ── 범례 ── */
#legend{position:absolute;bottom:14px;right:14px;background:rgba(4,6,14,.92);border:1px solid var(--border);border-radius:6px;padding:8px 12px;backdrop-filter:blur(6px);z-index:10;}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.leg-row:last-child{margin-bottom:0;}.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}.leg-lbl{font-size:11px;color:var(--sub);}

/* ── 우측 패널 ── */
#right-panel{width:256px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#detail-area{padding:12px;border-bottom:1px solid var(--border);min-height:170px;}
#det-ph{color:var(--dim);font-size:12px;text-align:center;padding-top:24px;line-height:1.9;}
#det-ct{display:none;}
#det-name{font-size:13px;font-weight:700;margin-bottom:3px;}
#det-badge{display:inline-flex;align-items:center;border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700;margin-bottom:6px;}
.drw{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.drb{flex:1;background:#0c1220;border-radius:2px;height:4px;}
.drf{height:100%;border-radius:2px;transition:width .4s;}.drl{font-size:11px;color:var(--sub);flex-shrink:0;}
.dc{margin-bottom:7px;}.dc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;}
.dcb{background:#0c1220;border-radius:2px;height:3px;}.dcf{height:100%;border-radius:2px;transition:width .4s;}
.dcv{font-size:10px;color:var(--dim);margin-top:2px;}
#list-area{flex:1;overflow-y:auto;padding:5px;}
#list-hdr{font-size:11px;color:var(--dim);font-weight:600;padding:4px 8px 5px;}
.srow{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent;margin-bottom:1px;transition:background .1s;}
.srow:hover{background:rgba(10,16,30,.9);}.srow.active{background:rgba(20,36,80,.7);border-color:#2a3a6a;}
.sdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.sname{flex:1;font-size:12px;color:#a8b0c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srow.active .sname{color:var(--text);font-weight:700;}
.sparty{font-size:11px;font-weight:700;flex-shrink:0;}
.srate-wrap{width:36px;flex-shrink:0;}
.srn{font-size:9px;color:var(--dim);text-align:right;}
.srb{height:2px;background:#0c1220;border-radius:1px;margin-top:2px;}.srf{height:100%;border-radius:1px;}

/* ── 설정 모달 ── */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);align-items:center;justify-content:center;z-index:200;}
#settings-overlay.on{display:flex;}
#settings-modal{background:#0a0e1c;border:1px solid var(--border2);border-radius:9px;padding:22px;width:440px;max-width:95vw;box-shadow:0 28px 70px rgba(0,0,0,.9);max-height:90vh;overflow-y:auto;}
.m-title{font-size:15px;font-weight:700;margin-bottom:18px;}
.m-sec{font-size:10px;color:#4a6aaa;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.m-lbl{font-size:12px;color:var(--sub);font-weight:600;display:block;margin-bottom:5px;}
.m-input{width:100%;padding:8px 10px;border-radius:4px;background:#060810;border:1px solid var(--border2);color:var(--text);font-size:12px;outline:none;font-family:inherit;}
.m-input:focus{border-color:#2a4a8a;}
.m-hint{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5;}
.m-group{margin-bottom:13px;}
.tog-row{display:flex;gap:7px;}
.tbtn{flex:1;padding:8px;border-radius:4px;cursor:pointer;background:rgba(8,12,24,.9);border:1px solid var(--border2);color:var(--sub);font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;}
.tbtn.active{background:rgba(18,89,195,.3);border-color:#1259c3;color:#6b9cf5;}
.info-box{background:rgba(18,89,195,.08);border:1px solid rgba(18,89,195,.2);border-radius:4px;padding:9px 12px;font-size:11px;color:#6b9cf5;line-height:1.7;margin-bottom:12px;}
.warn-box{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:4px;padding:9px 12px;font-size:11px;color:#f4a060;line-height:1.7;margin-bottom:12px;}
.m-btns{display:flex;gap:7px;margin-top:6px;}
.btn-ok{flex:1;padding:10px;border-radius:4px;cursor:pointer;background:rgba(18,89,195,.3);border:1px solid #1259c3;color:#6b9cf5;font-size:13px;font-weight:700;font-family:inherit;}
.btn-cancel{padding:10px 16px;border-radius:4px;cursor:pointer;background:transparent;border:1px solid var(--border2);color:var(--sub);font-size:13px;font-family:inherit;}
.btn-sm{padding:7px 13px;border-radius:4px;cursor:pointer;background:rgba(18,89,195,.15);border:1px solid rgba(18,89,195,.3);color:#6b9cf5;font-size:12px;font-family:inherit;}
#cache-st{font-size:11px;color:var(--dim);margin-top:6px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#060810;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;min-width:0">
    <div class="kbs-badge">KBS</div>
    <div>
      <div id="header-title">전국동시지방선거 <span id="hd-year">개표현황</span></div>
      <div id="header-sub">광역단체장(시·도지사)</div>
    </div>
    <div id="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
    <div style="font-size:11px;color:var(--sub);text-align:right;flex-shrink:0"><b style="color:#8a9ab8;font-weight:600;display:block">마지막 갱신</b><span id="time-str">--:--:--</span></div>
    <button class="hbtn" id="btn-live" onclick="toggleLive()" style="display:none">▶ 실시간</button>
    <button class="hbtn" id="btn-fetch" onclick="fetchHistorical()" style="display:none">↻ API</button>
    <button class="hbtn" onclick="openSettings()">⚙ 설정</button>
  </div>
</div>

<div id="election-tabs"></div>

<div id="summary-bar">
  <div class="sb-label" id="sb-lbl">광역단체장</div>
  <div class="sb-div"></div>
  <div id="seat-bar"></div>
  <div id="party-chips"></div>
  <div class="sb-right">
    <div id="err-msg"></div>
    <div id="data-src-badge"></div>
    <div id="avg-rate-lbl">개표율 <b id="avg-rate-val">0.0%</b></div>
  </div>
</div>

<div id="main">
  <div id="map-area">
    <div id="loading-wrap"><div class="spinner"></div><div id="loading-txt">지도 데이터를 불러오는 중...</div></div>
    
    <div id="drill-nav">
      <button class="btn-nav-back" onclick="drillUp()">⬅ 전국으로 돌아가기</button>
    </div>

    <svg id="map-svg"></svg>
    <div id="map-toolbar">
      <div class="tool-row map-tbtn" id="opacity-row" style="display:none; cursor:default;">
        <span style="font-size:11px; font-weight:700;">배경 밝기</span>
        <input type="range" id="bg-opacity" min="0" max="1" step="0.05" value="0.3" oninput="changeBgOpacity(this.value)">
      </div>
      
      <div class="tool-row">
        <label class="map-tbtn on" id="lbl-btn" style="cursor:pointer">
          <input type="checkbox" id="lbl-chk" checked onchange="toggleLabels(this.checked)">Aa 지명
        </label>
        <button class="map-tbtn" onclick="exportMapPNG(false)" title="지명 없는 PNG">⬇ PNG</button>
        <button class="map-tbtn" onclick="exportMapPNG(true)" title="지명 포함 PNG">⬇ PNG+글자</button>
      </div>
    </div>
    <div id="tooltip"></div>
    <div id="legend"></div>
  </div>

  <div id="right-panel">
    <div id="detail-area">
      <div id="det-ph">⚙ 설정에서 선관위 API Key를 입력하고<br><strong style="color:var(--sub)">↻ API 버튼을 눌러<br>데이터를 불러오세요</strong></div>
      <div id="det-ct" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
          <div id="det-name" style="font-size:13px;font-weight:700"></div>
          <div id="det-ctx" style="font-size:10px;color:var(--dim);font-weight:600"></div>
        </div>
        <div id="det-badge"></div>
        <div class="drw"><div class="drb"><div class="drf" id="det-rf"></div></div><div class="drl">개표 <span id="det-rv">0%</span></div></div>
        <div id="det-cands"></div>
        <div id="det-sgg-summary" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)"></div>
      </div>
    </div>
    <div id="list-area">
      <div id="list-hdr">전체 시도 현황</div>
      <div id="sido-list"></div>
    </div>
  </div>
</div>

<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div id="settings-modal">
    <div class="m-title">⚙ 설정</div>
    <div class="m-sec">📡 데이터 연동</div>
    <div class="m-group"><label class="m-lbl">모드 설정</label>
      <div class="tog-row">
        <button class="tbtn active" id="mode-mock" onclick="setMode('mock')">🔧 Mock 데모</button>
        <button class="tbtn" id="mode-real" onclick="setMode('real')">🌐 선관위 API</button>
      </div></div>
    <div id="real-s" style="display:none">
      <div class="m-group"><label class="m-lbl">공공데이터 API Key</label><input class="m-input" type="password" id="in-apikey" placeholder="투개표정보 API 키"></div>
    </div>
    <div class="m-group"><label class="m-lbl">SGIS 지도 연동</label>
      <input class="m-input" type="text" id="in-sgis-key" placeholder="SGIS Consumer Key" style="margin-bottom:5px">
      <input class="m-input" type="password" id="in-sgis-sec" placeholder="SGIS Consumer Secret">
    </div>
    <div class="m-group"><label class="m-lbl">CORS 프록시 URL</label><input class="m-input" type="text" id="in-proxy" placeholder="https://api.allorigins.win/raw?url="></div>
    <div class="m-group"><label class="m-lbl">폴링 간격</label>
      <div class="tog-row">
        <button class="tbtn" id="poll-10" onclick="setPoll(10)">10초</button>
        <button class="tbtn active" id="poll-30" onclick="setPoll(30)">30초</button>
        <button class="tbtn" id="poll-60" onclick="setPoll(60)">60초</button>
      </div></div>
    <div class="m-btns">
      <button class="btn-ok" onclick="saveSettings()">저장 및 적용</button>
      <button class="btn-sm" onclick="forceFetchNationwideSido(curEl().year)">🗺 전국 지도 캐시 초기화</button>
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
    </div>
    <div id="cache-st"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  DATA STATE & CONSTANTS
// ════════════════════════════════════════════
const PDB={'국민의힘':{color:'#E61E2B',short:'국힘'},'자유한국당':{color:'#E61E2B',short:'자한'},'새누리당':{color:'#E61E2B',short:'새누'},'한나라당':{color:'#E61E2B',short:'한나'},'더불어민주당':{color:'#1259C3',short:'민주'},'새정치민주연합':{color:'#1259C3',short:'새정'},'민주당':{color:'#1259C3',short:'민주'},'국민참여당':{color:'#1259C3',short:'참여'},'민주노동당':{color:'#F97316',short:'민노'},'조국혁신당':{color:'#00A68C',short:'혁신'},'바른미래당':{color:'#F97316',short:'바른'},'개혁신당':{color:'#F4802A',short:'개혁'},'정의당':{color:'#F4802A',short:'정의'},'자유선진당':{color:'#8B6FD4',short:'자선'},'무소속':{color:'#6B7280',short:'무소'}};
const pc=p=>PDB[p]?.color??'#555';
const ps=p=>PDB[p]?.short??(p?.slice(0,3)??'?');
const fmt=n=>n?Number(n).toLocaleString('ko-KR'):'-';

const ELECTIONS=[{sgId:'20260603',round:'제9회',year:2026,date:'2026.06.03',status:'upcoming'},{sgId:'20220601',round:'제8회',year:2022,date:'2022.06.01',status:'done'},{sgId:'20180613',round:'제7회',year:2018,date:'2018.06.13',status:'done'},{sgId:'20140604',round:'제6회',year:2014,date:'2014.06.04',status:'done'},{sgId:'20100602',round:'제5회',year:2010,date:'2010.06.02',status:'done'}];

// Q2. 완벽한 이름 정규화 함수 (선관위 API 데이터 매칭용)
function normalizeWiwName(name) {
  if(!name) return '';
  return String(name)
    .replace(/\s+/g, '') // 모든 공백 제거
    .replace(/^강원도/, '강원특별자치도')
    .replace(/^전라북도/, '전북특별자치도')
    .replace(/^전북$/, '전북특별자치도')
    .replace(/^제주도/, '제주특별자치도')
    .replace(/^제주$/, '제주특별자치도')
    .replace(/^경북$/, '경상북도')
    .replace(/^경남$/, '경상남도')
    .replace(/^충북$/, '충청북도')
    .replace(/^충남$/, '충청남도')
    .replace(/^전남$/, '전라남도')
    .trim();
}

// SGIS의 긴 시군구 이름("서울특별시 종로구")에서 순수 구 이름("종로구")만 추출
function extractSggNameFromSgis(adm_nm, sidoNm) {
    let s = String(adm_nm || '').trim();
    const p = String(sidoNm || '').trim();
    if (p && s.startsWith(p)) {
        s = s.replace(p, '').trim();
    }
    return s || adm_nm;
}

};

// ════════════════════════════════════════════
//  COORDINATE CONVERSION (정밀도 상향)
// ════════════════════════════════════════════
function utmk2wgs(x,y){
  const a=6378137,e2=0.00669438002290,dx=1000000,dy=2000000,lo=127.5*Math.PI/180,po=38*Math.PI/180;
  const px=x-dx,py=y-dy;const e4=e2*e2,e6=e4*e2;
  const M0=a*((1-e2/4-3*e4/64-5*e6/256)*po-(3*e2/8+3*e4/32+45*e6/1024)*Math.sin(2*po)+(15*e4/256+45*e6/1024)*Math.sin(4*po));
  const M=M0+py;const mu=M/(a*(1-e2/4-3*e4/64-5*e6/256));const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const p=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const sp=Math.sin(p),cp=Math.cos(p),tp=sp/cp;const N=a/Math.sqrt(1-e2*sp*sp),T=tp*tp,C=e2/(1-e2)*cp*cp;
  const R=a*(1-e2)/(1-e2*sp*sp)**1.5,D=px/N;
  const lat=p-(N*tp/R)*(D*D/2-(5+3*T+10*C-4*C*C)*D**4/24+(61+90*T+298*C+45*T*T)*D**6/720);
  const lon=lo+(D-(1+2*T+C)*D**3/6+(5-2*C+28*T)*D**5/120)/cp;
  // 좌표 정밀도 소수점 6자리 보정 (틈새 방지)
  return[Math.round(lon*180/Math.PI*1e6)/1e6, Math.round(lat*180/Math.PI*1e6)/1e6];
}
function convC(c){if(!c)return c;if(typeof c[0]==='number')return utmk2wgs(c[0],c[1]);return c.map(convC);}
function convGeo(geo){
  try{let c=geo.features[0]?.geometry?.coordinates; while(Array.isArray(c[0]))c=c[0]; if(Math.abs(c[0])<500) return geo;}catch{}
  return{...geo,features:geo.features.map(f=>({...f,geometry:{...f.geometry,coordinates:convC(f.geometry.coordinates)}}))};
}

// ════════════════════════════════════════════
//  SGIS API FETCHING (Q1 & Q3: 완전 분리된 구조)
// ════════════════════════════════════════════
async function getSgisToken() {
    if (ST.sgisToken) return ST.sgisToken;
    const proxy = ST.proxyUrl.replace(/\/$/, '');
    const authUrl = `https://sgisapi.mods.go.kr/OpenAPI3/auth/authentication.json?consumer_key=${encodeURIComponent(ST.sgisKey)}&consumer_secret=${encodeURIComponent(ST.sgisSecret)}`;
    const r = await fetch(`${proxy}?url=${encodeURIComponent(authUrl)}`);
    const d = await r.json();
    if (d.errCd !== 0) throw new Error(d.errMsg);
    ST.sgisToken = d.result.accessToken;
    return ST.sgisToken;
}

// 1) 전국 고해상도 시도 맵 로드 (최초 1회)
async function fetchNationwideSidoGeo(targetYear) {
    const token = await getSgisToken();
    const proxy = ST.proxyUrl.replace(/\/$/, '');
    const apiYear = targetYear > 2023 ? 2023 : targetYear;
    
    let geo = null;
    for (let yr = apiYear; yr >= 2010; yr--) {
        const url = `https://sgisapi.mods.go.kr/OpenAPI3/boundary/hadmarea.geojson?accessToken=${token}&year=${yr}&low_search=0`;
        const res = await fetch(`${proxy}?url=${encodeURIComponent(url)}`);
        if (res.ok) {
            const d = await res.json();
            if (d.features && d.features.length) {
                geo = d; break;
            }
        }
    }
    if (!geo) throw new Error("전국 시도 지도를 찾을 수 없습니다.");

    // 코드 길이 2자리(시도)인 것만 필터 및 속성 정리
    ST.sidoGeo = {
        type: 'FeatureCollection',
        features: convGeo(geo).features.filter(f => String(f.properties?.adm_cd || '').length === 2).map(f => {
            const cd = f.properties.adm_cd;
            f.properties.sidoCd = cd;
            f.properties.sidoNm = SIDO_CODE_MAP[cd] || f.properties.adm_nm;
            return f;
        })
    };
}

// 2) 클릭된 특정 시도의 고해상도 시군구 맵 로드 (필요할 때만 호출)
async function fetchSggGeoForSido(sidoCd, targetYear) {
    if (ST.sggGeoCache[sidoCd]) return ST.sggGeoCache[sidoCd];

    const loading = document.getElementById('loading-wrap');
    const txt = document.getElementById('loading-txt');
    loading.style.display = 'flex';
    txt.textContent = `${SIDO_CODE_MAP[sidoCd] || ''} 시군구 지도 다운로드 중...`;

    try {
        const token = await getSgisToken();
        const proxy = ST.proxyUrl.replace(/\/$/, '');
        const apiYear = targetYear > 2023 ? 2023 : targetYear;

        const url = `https://sgisapi.mods.go.kr/OpenAPI3/boundary/hadmarea.geojson?accessToken=${token}&year=${apiYear}&adm_cd=${sidoCd}&low_search=1`;
        const res = await fetch(`${proxy}?url=${encodeURIComponent(url)}`);
        const geo = await res.json();

        if (!geo.features) throw new Error("시군구 지도가 없습니다.");

        const fc = {
            type: 'FeatureCollection',
            features: convGeo(geo).features.filter(f => String(f.properties?.adm_cd || '').length === 5).map(f => {
                const cd = f.properties.adm_cd;
                f.properties.sggCd = cd;
                const sidoName = SIDO_CODE_MAP[cd.slice(0,2)];
                f.properties.sidoNm = sidoName;
                // SGIS 이름에서 시도명 제거 (예: 서울특별시 종로구 -> 종로구)
                f.properties.sggNm = extractSggNameFromSgis(f.properties.adm_nm, sidoName);
                return f;
            })
        };
        ST.sggGeoCache[sidoCd] = fc;
        return fc;
    } finally {
        loading.style.display = 'none';
    }
}

//  지도 초기화 및 로드 제어
// ════════════════════════════════════════════
async function loadGeo(year) {
  const loading = document.getElementById('loading-wrap');
  const txt = document.getElementById('loading-txt');
  loading.style.display = 'flex';
  txt.textContent = `${year}년 고해상도 전국 지도 불러오는 중...`;
  
  ST.sggGeoCache = {}; // 연도가 바뀌면 시군구 캐시 초기화

  try {
    if (!ST.sgisKey || !ST.sgisSecret) throw new Error("SGIS 연동 정보가 없습니다.");
    await fetchNationwideSidoGeo(year);
    ST.geoLoaded = true;
    rebuildMap();
  } catch(e) {
    console.warn("SGIS 로드 실패, 로컬 맵 폴백", e);
    // 폴백 기본 지도
    const [sd]=await Promise.all([tryFetch('./geo/sido.geojson')]);
    if(sd) {
        ST.sidoGeo=convGeo(sd); ST.sidoGeo.features.forEach(f=>{f.properties.sidoNm=f.properties.CTP_KOR_NM}); 
        ST.geoLoaded=true; rebuildMap();
    } else {
        txt.textContent = '지도 데이터가 없습니다. SGIS 설정을 확인해주세요.';
        return; // loading 안 숨김
    }
  }
  loading.style.display = 'none';
}

function forceFetchNationwideSido(year) {
    ST.sgisToken = null; // 토큰 만료 대비
    loadGeo(year);
    closeSettings();
}

let _proj=null,_path=null,_mapInitialized=false;

function getPartyColorForSido(sidoNm) {
    if(ST.data[sidoNm] && ST.data[sidoNm].winner) return pc(ST.data[sidoNm].winner);
    return '#111a30';
}

function getPartyColorForSgg(sidoNm, sgisSggNm) {
    const sggData = ST.D_SGG[ST.currentSgId]?.[sidoNm];
    if (!sggData) return null;

    const cleanSgis = normalizeWiwName(sgisSggNm);
    
    // 선관위 이름과 정규화 매칭
    for (const [necName, party] of Object.entries(sggData)) {
        const cleanNec = normalizeWiwName(necName);
        if (cleanSgis === cleanNec || cleanSgis.includes(cleanNec) || cleanNec.includes(cleanSgis)) {
            return pc(party);
        }
    }
    return null;
}

function rebuildMap() {
  _mapInitialized = false;
  d3.select('#map-svg').selectAll('*').remove();
  d3.select('#map-svg').on('.zoom', null);
  ST.currentTransform = d3.zoomIdentity;
  
  initMapLayers();
  renderList();
  renderSummaryBar();
}

function initMapLayers(){
  if(_mapInitialized || !ST.sidoGeo) return;
  const svgEl=document.getElementById('map-svg');
  const W=svgEl.clientWidth||700,H=svgEl.clientHeight||600;
  const svg=d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`);

  ST.zoomBehavior=d3.zoom().scaleExtent([1,20]).on('zoom',ev=>{
    ST.currentTransform=ev.transform;
    const k=ev.transform.k;
    svg.select('#map-g').attr('transform',ev.transform);
    
    svg.select('#sido-layer').attr('stroke-width', 0.8 / k);
    svg.select('#sgg-layer').attr('stroke-width', 0.5 / k);
    
    svg.selectAll('.sido-lbl,.sgg-lbl').attr('transform',function(d) {
      try {
        const ct=_path.centroid(d);
        let x = ct[0], y = ct[1];
        if (d3.select(this).classed('sido-lbl') && d.properties.sidoNm === '경기도') {
            x += 15; y += 25; 
        }
        return `translate(${x},${y}) scale(${1/k})`;
      } catch { return 'translate(0,0)'; }
    });
  });
  
  svg.call(ST.zoomBehavior);
  svg.on('dblclick.zoom',null);

  const g=svg.append('g').attr('id','map-g');
  
  // SIDO (전국용)와 SGG (확대용) 레이어를 완벽히 분리
  g.append('g').attr('id','sido-layer').attr('stroke-linejoin', 'round').attr('stroke', 'rgba(0,0,0,0.8)');
  g.append('g').attr('id','sgg-layer').attr('stroke-linejoin', 'round').attr('stroke', 'rgba(0,0,0,0.4)');
  g.append('g').attr('id','lbl-layer');

  _proj=d3.geoMercator().fitExtent([[18,18],[W-18,H-18]],ST.sidoGeo);
  _path=d3.geoPath().projection(_proj);

  // 전국 시도 렌더링
  d3.select('#sido-layer').selectAll('.sido-p')
    .data(ST.sidoGeo.features).join('path')
    .attr('class','sido-p')
    .attr('d',_path)
    .style('cursor','pointer')
    .on('mouseover',function(ev,d){
      const nm = d.properties.sidoNm;
      if(!ST.selectedSidoCd) d3.select(this).attr('opacity',.72);
      showDetail(nm); showMainTooltip(ev,nm,svgEl.clientWidth);
    })
    .on('mousemove',ev=>moveTooltip(ev,svgEl.clientWidth))
    .on('mouseout',function(ev,d){
      const nm = d.properties.sidoNm;
      if(!ST.selectedSidoCd) d3.select(this).attr('opacity', 1);
      clearDetail(); hideTooltip();
    })
    .on('click',(ev,d)=> drillDown(d.properties.sidoCd, d.properties.sidoNm) );

  // 시도 라벨 렌더링
  d3.select('#lbl-layer').selectAll('.sido-lbl')
    .data(ST.sidoGeo.features).join('text')
    .attr('class','sido-lbl')
    .attr('transform',function(d){
        const ct=_path.centroid(d);
        if (d.properties.sidoNm === '경기도') { ct[0]+=15; ct[1]+=25; }
        return `translate(${ct[0]},${ct[1]})`;
    })
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-family',"'Noto Sans KR',sans-serif")
    .attr('font-size',d=>d.properties.sidoNm ==='경기도'?'13':'11')
    .attr('font-weight','700').attr('fill','rgba(255,255,255,.88)').attr('pointer-events','none')
    .text(d=>shortSido(d.properties.sidoNm));

  _mapInitialized=true;
  updateMapColors();
}

function renderSggMap(sggGeo, sidoNm) {
    const svgEl=document.getElementById('map-svg');
    const sggLayer = d3.select('#sgg-layer');
    const lblLayer = d3.select('#lbl-layer');
    
    // 기존 시군구 지우기
    sggLayer.selectAll('*').remove();
    lblLayer.selectAll('.sgg-lbl').remove();

    if(!sggGeo) return;

    // 시군구 패스 렌더링
    sggLayer.selectAll('.sgg-path')
      .data(sggGeo.features).join('path')
      .attr('class','sgg-path')
      .attr('d',_path)
      .style('cursor','pointer')
      .on('mouseover',function(ev,d){
        d3.select(this).attr('opacity',0.75); 
        const party = getPartyColorForSgg(sidoNm, d.properties.sggNm);
        const partyName = Object.keys(PDB).find(key => PDB[key].color === party) || null;
        showSggTooltip(ev, d.properties.sggNm, partyName, sidoNm);
      })
      .on('mousemove',ev=>moveTooltip(ev,svgEl.clientWidth))
      .on('mouseout',function(){
        d3.select(this).attr('opacity', 1);
        hideTooltip();
      });

    // 시군구 라벨 렌더링
    lblLayer.selectAll('.sgg-lbl')
      .data(sggGeo.features).join('text')
      .attr('class','sgg-lbl')
      .attr('transform',d=>{try{const ct=_path.centroid(d);return `translate(${ct[0]},${ct[1]})`;}catch{return 'translate(0,0)';}})
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family',"'Noto Sans KR',sans-serif")
      .attr('font-size', '8')
      .attr('font-weight','600').attr('fill','rgba(255,255,255,.9)').attr('pointer-events','none')
      .text(d => d.properties.sggNm.replace(/시$|구$|군$/,'').slice(0,4));
      
    // 현재 스케일에 맞춰 텍스트 크기 조정
    if (ST.currentTransform) {
        const k = ST.currentTransform.k;
        lblLayer.selectAll('.sgg-lbl').attr('transform',function(d) {
            try { const ct=_path.centroid(d); return `translate(${ct[0]},${ct[1]}) scale(${1/k})`; } catch { return 'translate(0,0)'; }
        });
    }

    updateMapColors();
}

function updateMapColors(){
  if(!_mapInitialized)return;

  // 1. 전국 단위 시도 렌더링 제어 (스위칭)
  d3.selectAll('.sido-p')
    .style('display', d => {
        // 선택된 지역이면 SIDO 폴리곤을 숨기고 그 자리를 SGG에게 양보함!
        if (ST.selectedSidoCd && d.properties.sidoCd === ST.selectedSidoCd) return 'none';
        return 'block';
    })
    .attr('fill', d => getPartyColorForSido(d.properties.sidoNm))
    .attr('opacity', d => (ST.selectedSidoCd && d.properties.sidoCd !== ST.selectedSidoCd) ? ST.bgOpacity : 1);

  d3.selectAll('.sido-lbl').style('display', ST.selectedSidoCd ? 'none' : (ST.showLabels ? 'block' : 'none'));

  // 2. 드릴다운 시군구 렌더링 제어
  d3.selectAll('.sgg-path')
    .attr('fill', d => {
       const partyColor = getPartyColorForSgg(d.properties.sidoNm, d.properties.sggNm);
       if (partyColor) return partyColor;
       // 데이터가 없으면 시도지사 색상으로 옅게 폴백
       const sidoWinnerColor = getPartyColorForSido(d.properties.sidoNm);
       return sidoWinnerColor !== '#111a30' ? sidoWinnerColor + '44' : '#1a2030';
    })
    .attr('opacity', 1);

  d3.selectAll('.sgg-lbl').style('display', ST.showLabels ? 'block' : 'none');
  
  renderLegend();
}

// Q3. 시도 클릭 시 비동기 처리 및 스위칭
async function drillDown(sidoCd, sidoNm){
  if(!_mapInitialized)return;
  ST.selectedSidoCd = sidoCd;
  ST.selectedSidoNm = sidoNm;

  document.getElementById('drill-nav').style.display='block';
  document.getElementById('opacity-row').style.display='flex';

  // 시군구 데이터 동적 로드 및 렌더
  const sggGeo = await fetchSggGeoForSido(sidoCd, curEl().year);
  renderSggMap(sggGeo, sidoNm);

  // 줌인 애니메이션
  const feat = ST.sidoGeo.features.find(f => f.properties.sidoCd === sidoCd);
  if (feat) {
      const svgEl = document.getElementById('map-svg');
      const W = svgEl.clientWidth, H = svgEl.clientHeight;
      const [[x0,y0],[x1,y1]] = _path.bounds(feat);
      const pw = x1-x0, ph = y1-y0;
      if (pw>0 && ph>0) {
          const scale = Math.min(18, 0.82 / Math.max(pw/W, ph/H));
          const tx = W/2 - scale*(x0+pw/2), ty = H/2 - scale*(y0+ph/2);
          const t = d3.zoomIdentity.translate(tx,ty).scale(scale);
          d3.select('#map-svg').transition().duration(650).call(ST.zoomBehavior.transform, t);
      }
  }

  showDetail(sidoNm);
  buildSggResultPanel(sidoNm);
}

function drillUp(){
  if(!ST.selectedSidoCd)return;
  ST.selectedSidoCd = null;
  ST.selectedSidoNm = null;
  
  document.getElementById('drill-nav').style.display='none';
  document.getElementById('opacity-row').style.display='none';
  
  // SGG 레이어 비우기
  d3.select('#sgg-layer').selectAll('*').remove();
  d3.select('#lbl-layer').selectAll('.sgg-lbl').remove();
  
  updateMapColors();
  
  if(ST.zoomBehavior){
    d3.select('#map-svg').transition().duration(600).call(ST.zoomBehavior.transform,d3.zoomIdentity);
  }
  ST.currentTransform=d3.zoomIdentity;
  clearDetail();
  renderList();
}

function resizeMap(){
  if(!_mapInitialized)return;
  const svgEl=document.getElementById('map-svg');
  const W=svgEl.clientWidth||700,H=svgEl.clientHeight||600;
  d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`);
  _proj=d3.geoMercator().fitExtent([[18,18],[W-18,H-18]],ST.sidoGeo);
  _path=d3.geoPath().projection(_proj);
  
  d3.selectAll('.sido-p').attr('d', _path);
  d3.selectAll('.sgg-path').attr('d', _path);
  
  d3.selectAll('.sido-lbl').attr('transform',function(d){
      const ct=_path.centroid(d);
      if(d.properties.sidoNm === '경기도') { ct[0] += 15; ct[1] += 25; }
      return `translate(${ct[0]},${ct[1]})`;
  });
  d3.selectAll('.sgg-lbl').attr('transform',d=>{try{const ct=_path.centroid(d);return `translate(${ct[0]},${ct[1]})`;}catch{return 'translate(0,0)';}});
  
  if(ST.selectedSidoCd&&ST.zoomBehavior){
      const feat = ST.sidoGeo.features.find(f => f.properties.sidoCd === ST.selectedSidoCd);
      if(feat) {
          const [[x0,y0],[x1,y1]] = _path.bounds(feat);
          const pw = x1-x0, ph = y1-y0;
          const scale = Math.min(18, 0.82 / Math.max(pw/W, ph/H));
          const tx = W/2 - scale*(x0+pw/2), ty = H/2 - scale*(y0+ph/2);
          d3.select('#map-svg').call(ST.zoomBehavior.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
      }
  }
}

function changeBgOpacity(val) {
  ST.bgOpacity = parseFloat(val);
  updateMapColors();
}

function buildSggResultPanel(sidoNm){
  const sgId=ST.currentSgId;
  const sggData=ST.D_SGG[sgId]?.[sidoNm]||null;
  const hasFallback=!sggData&&ST.D_SGG['20220601']?.[sidoNm];
  const listEl=document.getElementById('sido-list');
  if(NO_SGG.includes(sidoNm)){ listEl.innerHTML='<div style="padding:10px 8px;font-size:11px;color:var(--dim)">기초단체장 선거 없음</div>';return; }
  if(!sggData){
    const loadingMsg=ST.apiKey?`⏳ 시군구 결과 로딩 중...`:`기초단체장 데이터 없음`;
    listEl.innerHTML=`<div style="padding:10px 8px;font-size:11px;color:var(--dim)">${loadingMsg}<br><span style="color:${hasFallback?'#6a9af5':'var(--dim)'}">${hasFallback?'광역단체장 기준으로 색상 표시됨':'(광역단체장 기준 색상)'}</span></div>`;return;
  }
  const counts={}; Object.entries(sggData).forEach(([,p])=>{counts[p]=(counts[p]||0)+1;});
  let html=`<div id="list-hdr" style="font-size:11px;color:var(--dim);font-weight:600;padding:4px 8px 5px">기초단체장 · ${shortSido(sidoNm)}</div><div style="display:flex;gap:5px;flex-wrap:wrap;padding:0 8px 8px">`;
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([p,n])=>{ html+=`<span style="font-size:11px;padding:2px 7px;border-radius:3px;font-weight:700;background:${pc(p)}22;border:1px solid ${pc(p)}55;color:${pc(p)}">${ps(p)} ${n}</span>`; });
  html+=`</div>`;
  Object.entries(sggData).forEach(([nm,party])=>{
    const detail=ST.sggDetail?.[sgId]?.[sidoNm]?.[nm];
    const top=detail?.cands?.[0];
    html+=`<div class="srow" style="cursor:default"><div class="sdot" style="background:${pc(party)}"></div><div class="sname">${nm}</div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:center"><span class="sparty" style="color:${pc(party)}">${ps(party)}</span><span style="font-size:10px;color:var(--dim)">${top?top.pct+'%':''}</span></div>${top?`<div style="font-size:10px;color:var(--sub);margin-top:1px">${top.name}</div>`:''}</div></div>`;
  });
  listEl.innerHTML=html;
}

function showSggTooltip(ev,sggName,party,sidoNm){
  const tt=document.getElementById('tooltip');
  let h=`<div style="font-size:12px;font-weight:700;margin-bottom:4px">${sggName}</div>`;
  if(party){
    h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px"><div style="width:7px;height:7px;border-radius:2px;background:${pc(party)}"></div><span style="font-size:11px;font-weight:700;color:${pc(party)}">${party}</span></div>`;
    const detail=ST.sggDetail?.[ST.currentSgId]?.[sidoNm];
    const cleanSgg = normalizeWiwName(sggName);
    let d = null;
    if(detail) {
      const matchKey = Object.keys(detail).find(k => normalizeWiwName(k) === cleanSgg || normalizeWiwName(k).includes(cleanSgg) || cleanSgg.includes(normalizeWiwName(k)));
      d = detail[matchKey];
    }
    if(d?.cands){
      d.cands.slice(0,3).forEach((c,i)=>{ h+=`<div style="margin-bottom:3px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px"><span style="color:${i===0?'var(--text)':'var(--sub)'}">${c.name}</span><span style="color:${pc(c.party)};font-weight:700">${c.pct}%</span></div><div style="background:#0c1220;height:2px;border-radius:1px"><div style="width:${Math.min(c.pct,100)}%;height:100%;background:${pc(c.party)};opacity:${i===0?1:.4};border-radius:1px"></div></div></div>`; });
    }else{ h+=`<div style="font-size:10px;color:var(--dim);margin-top:3px">기초단체장</div>`; }
  }else{ h+='<div style="font-size:11px;color:var(--sub)">집계 중</div>'; }
  tt.innerHTML=h;tt.classList.add('on'); moveTooltip(ev,document.getElementById('map-svg').clientWidth);
}

function moveTooltip(ev,mapW){
  const tt=document.getElementById('tooltip');if(!tt.classList.contains('on'))return;
  const r=document.getElementById('map-area').getBoundingClientRect();
  const x=ev.clientX-r.left,y=ev.clientY-r.top;
  tt.style.left=(x+tt.offsetWidth+12>mapW?x-tt.offsetWidth:x+12)+'px';
  tt.style.top=Math.min(y-10,r.height-160)+'px';
}
function hideTooltip(){document.getElementById('tooltip').classList.remove('on');}

function exportMapPNG(withLabels){
  const svgEl=document.getElementById('map-svg');
  const SCALE=2; const W=svgEl.clientWidth,H=svgEl.clientHeight; const CW=W*SCALE,CH=H*SCALE;
  const clone=svgEl.cloneNode(true);
  clone.setAttribute('width',CW); clone.setAttribute('height',CH); clone.setAttribute('viewBox',`0 0 ${W} ${H}`); clone.style.background='transparent';
  if(clone.querySelector('#map-g') && ST.currentTransform){
    const t=ST.currentTransform; clone.querySelector('#map-g').setAttribute('transform',`translate(${t.x},${t.y}) scale(${t.k})`);
    if (clone.querySelector('#sido-layer')) clone.querySelector('#sido-layer').setAttribute('stroke-width', 0.8 / t.k);
    if (clone.querySelector('#sgg-layer')) clone.querySelector('#sgg-layer').setAttribute('stroke-width', 0.5 / t.k);
    clone.querySelectorAll('.sido-lbl,.sgg-lbl').forEach(txt=>{ txt.setAttribute('font-size',Math.max(3,parseFloat(txt.getAttribute('font-size')||'11')/t.k)); });
  }
  clone.querySelectorAll('[style*="display: none"]').forEach(e => e.remove());
  if(!withLabels) clone.querySelectorAll('.sido-lbl,.sgg-lbl').forEach(e=>e.remove());
  else clone.querySelectorAll('text').forEach(t=>t.setAttribute('font-family',"Pretendard,'Apple SD Gothic Neo','Malgun Gothic','나눔고딕',sans-serif"));
  const url=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml;charset=utf-8'}));
  const img=new Image();
  img.onload=()=>{
    const cv=document.createElement('canvas'); cv.width=CW;cv.height=CH;
    const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,CW,CH);
    const a=document.createElement('a'); a.download=`election_${curEl().year}${ST.selectedSidoNm?`_${ST.selectedSidoNm.replace(/특별자치도$|특별자치시$|특별시$|광역시$/,'')}`:'_전국'}_${withLabels?'글자':'지도만'}.png`;
    a.href=cv.toDataURL('image/png'); a.click(); URL.revokeObjectURL(url);
  };
  img.src=url;
}

async function switchElection(sgId){
  if(ST.isLive)toggleLive(); stopPolling();
  if(ST.selectedSidoCd) drillUp();
  
  ST.currentSgId=sgId;
  const targetYear = curEl().year;

  if(!ST._loaded) ST._loaded={};
  if(ST._loaded[sgId]){ ST.data=ST._loaded[sgId]; ST.dataSource='api'; }
  else { ST.data={}; ST.dataSource='none'; }
  
  renderTabs();updateHeader();clearDetail();
  await loadGeo(targetYear);
}

  const el=curEl();
  document.getElementById('hd-year').textContent=`${el.year} 개표현황`;
  document.getElementById('header-sub').textContent=`${el.round} · ${el.date} · 광역단체장(시·도지사)`;

  else {b.className='none';b.textContent='데이터 없음 — ↻ API 버튼 클릭';}

function toggleLive(){
  if(!isUpcoming())return;
  ST.isLive=!ST.isLive;
  const btn=document.getElementById('btn-live');
  document.getElementById('live-badge').classList.toggle('on',ST.isLive);
  btn.classList.toggle('live-on',ST.isLive); btn.textContent=ST.isLive?'■ 중지':'▶ 실시간';
  if(ST.isLive){poll();ST.pollTimer=setInterval(poll,ST.pollSec*1000);}else stopPolling();
}
function stopPolling(){if(ST.pollTimer){clearInterval(ST.pollTimer);ST.pollTimer=null;}}

async function poll(){
  if(ST.mode==='mock'){
    let ch=false;
    SIDO_ALL.forEach(k=>{
      const d=ST.data[k];
      if(d&&(d.rate==null||d.rate<100)){
        d.rate=Math.min(100,+((d.rate||0)+Math.random()*3.5).toFixed(1));
        d.status=d.rate>=100?'final':'counting'; ch=true;
      }
    });
    if(ch){updateMapColors();renderSummaryBar();renderList();}
  }else{
    if(!ST.apiKey) return;
    await fetchAllSidoAPI(ST.currentSgId);
  }
}

async function fetchHistorical(){
  if(!ST.apiKey){alert('설정 ⚙ 에서 선관위 API Key를 입력하세요');openSettings();return;}
  const btn=document.getElementById('btn-fetch');btn.textContent='...';btn.disabled=true;
  try{
    await fetchAllSidoAPI(ST.currentSgId);
    ST.dataSource='api'; updateHeader();
    const sggEl=document.getElementById('err-msg');
    if(sggEl){sggEl.textContent='시군구 개표 결과 로딩 중...';sggEl.classList.add('show');}
    await fetchAllSggAPI(ST.currentSgId);
    if(sggEl)setTimeout(()=>sggEl.classList.remove('show'),2000);
  }finally{ btn.textContent='↻ API';btn.disabled=false; }
}

const NEC_SIDO_NAMES={'강원특별자치도':['강원특별자치도','강원도'],'전북특별자치도':['전북특별자치도','전라북도'],'제주특별자치도':['제주특별자치도','제주도']};
async function _necFetch(necUrl){
  const url=ST.proxyUrl ? ST.proxyUrl.replace(/\/$/,'')+`?url=${encodeURIComponent(necUrl)}` : necUrl;
  const r=await fetch(url); if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const j=await r.json(); const items=j?.response?.body?.items?.item??j?.body?.items?.item;
  return Array.isArray(items)?items:(items?[items]:null);
}

async function fetchOneSido(sgId,nm){
  const nameList=NEC_SIDO_NAMES[nm]||[nm]; let arr=null;
  for(const sdName of nameList){
    const necUrl=`https://apis.data.go.kr/9760000/VoteXmntckInfoInqireService2/getXmntckSttusInfoInqire?serviceKey=${encodeURIComponent(ST.apiKey)}&sgId=${sgId}&sgTypecode=3&sdName=${encodeURIComponent(sdName)}&numOfRows=50&pageNo=1&resultType=json`;
    try{ arr=await _necFetch(necUrl); if(arr&&arr.length)break; }catch(e){}
  }
  if(!arr||!arr.length)return null;
  const row=arr.find(it=>!it.wiwName||it.wiwName===nm||it.wiwName==='')||arr[0];
  const cands=[]; const tv=(parseInt(row.yutusu||0)||parseInt(row.tusu||0)||1);
  for(let i=1;i<=50;i++){
    const x=String(i).padStart(2,'0'); const votes=parseInt(row[`dugsu${x}`]||0);
    if(!row[`hbj${x}`]&&!votes)break; if(isNaN(votes)||votes<0)continue;
    cands.push({name:String(row[`hbj${x}`]||'').trim(),party:String(row[`jd${x}`]||'무소속').trim(), votes,pct:+(votes/tv*100).toFixed(1)});
  }
  cands.sort((a,b)=>b.votes-a.votes); if(!cands.length)return null;
  const totalDugsu=cands.reduce((s,c)=>s+c.votes,0); let rate=null;
  if((parseInt(row.yutusu||0))>0&&totalDugsu>0){ rate = Math.abs(totalDugsu-(parseInt(row.yutusu||0)))/(parseInt(row.yutusu||0))<0.01 ? 100 : Math.min(99.9,+(totalDugsu/(parseInt(row.yutusu||0))*100).toFixed(1)); }
  return{winner:cands[0].party,rate,status:rate===100?'final':rate!==null?'counting':'unknown',cands};  
}

async function fetchAllSidoAPI(sgId){
  const errEl=document.getElementById('err-msg'); errEl.classList.remove('show');
  let done=0,success=0; const failed=[];
  const tasks=SIDO_ALL.map(nm=>async()=>{
    try{ const r=await fetchOneSido(sgId,nm); if(r){ST.data[nm]=r;success++;} }catch(err){ failed.push(shortSido(nm)); }
    finally{ done++; if(success>0&&_mapInitialized)updateMapColors(); errEl.textContent=`${done}/${SIDO_ALL.length} 갱신 중${failed.length?` (실패: ${failed.join(', ')})` :''}`; errEl.classList.add('show'); }
  });
  let idx = 0; await Promise.all(Array.from({length: 5}, async () => { while (idx < tasks.length) await tasks[idx++](); }));
  if(success>0){
    if(!ST._loaded)ST._loaded={}; ST._loaded[sgId]=JSON.parse(JSON.stringify(ST.data)); ST.dataSource='api'; updateHeader();
    updateMapColors(); renderList(); renderSummaryBar();
    fetchAllSggAPI(sgId).catch(()=>{});
    errEl.textContent=failed.length ?`${success}/${SIDO_ALL.length} 완료, 실패: ${failed.join(', ')}`:`✅ API 갱신 완료`;
    setTimeout(()=>errEl.classList.remove('show'),4000);
  }else{ errEl.textContent='⚠ API 호출 실패 — 키를 확인하세요'; errEl.classList.add('show'); }
}

async function _necFetchAll(baseUrl){
  const first=await _necFetch(baseUrl+'&pageNo=1'); if(!first||!first.length)return first;
  const r=await fetch(ST.proxyUrl ? ST.proxyUrl.replace(/\/$/,'')+`?url=${encodeURIComponent(baseUrl+'&pageNo=1')}` : baseUrl+'&pageNo=1');
  const j=await r.json(); const totalCount=parseInt(j?.response?.body?.totalCount||j?.body?.totalCount||first.length);
  if(totalCount<=100)return first;
  const extras=await Promise.all(Array.from({length:Math.ceil(totalCount/100)-1},(_,i)=>_necFetch(baseUrl+`&pageNo=${i+2}`).catch(()=>null)));
  const all=[...first]; extras.forEach(e=>{if(e)all.push(...e);}); return all;
}

async function fetchAllSggAPI(sgId){
  if(!ST.apiKey)return; if(!ST.D_SGG)ST.D_SGG={}; if(!ST.D_SGG[sgId])ST.D_SGG[sgId]={};
  let success=0;
  const tasks=SIDO_ALL.map(sidoNm=>async()=>{
    try{
      let arr=null;
      for(const sdName of (NEC_SIDO_NAMES[sidoNm]||[sidoNm])){
        try{ const rows=await _necFetchAll(`https://apis.data.go.kr/9760000/VoteXmntckInfoInqireService2/getXmntckSttusInfoInqire?serviceKey=${encodeURIComponent(ST.apiKey)}&sgId=${sgId}&sgTypecode=4&sdName=${encodeURIComponent(sdName)}&numOfRows=100&resultType=json`); if(rows&&rows.length){ arr=rows; break; } }catch(e){}
      }
      if(!arr||!arr.length) return;
      const result={}; const detail={};   
      for(const row of arr){
        const wiwName=String(row.wiwName||'').trim(); if(!wiwName)continue;
        const yutusu=parseInt(row.yutusu||0)||parseInt(row.tusu||0)||1; const cands=[];
        for(let i=1;i<=50;i++){
          const x=String(i).padStart(2,'0'); const nm=String(row[`hbj${x}`]||'').trim(); const votes=parseInt(row[`dugsu${x}`]||0);
          if(!nm&&!votes)break; if(!isNaN(votes)&&votes>=0) cands.push({name:nm,party:String(row[`jd${x}`]||'무소속').trim(), votes,pct:+(votes/yutusu*100).toFixed(1)});
        }
        cands.sort((a,b)=>b.votes-a.votes);
        if(cands.length){ result[wiwName]=cands[0].party; detail[wiwName]={winner:cands[0].party,cands}; }
      }
      if(Object.keys(result).length){
        ST.D_SGG[sgId][sidoNm]=result;
        if(!ST.sggDetail)ST.sggDetail={}; if(!ST.sggDetail[sgId])ST.sggDetail[sgId]={}; ST.sggDetail[sgId][sidoNm]=detail;
        success++;
      }
    }catch(e){}
  });
  let idx = 0; await Promise.all(Array.from({length: 5}, async () => { while (idx < tasks.length) await tasks[idx++](); }));
  if(success>0 && ST.selectedSidoCd){ updateMapColors(); buildSggResultPanel(ST.selectedSidoNm); }
}
