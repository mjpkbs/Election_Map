<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국동시지방선거 개표현황 | KBS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#04060e;--panel:#070a14;--border:#10182a;--border2:#1a2540;--text:#c8d2e8;--sub:#6a7a9a;--dim:#323a52;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
#header{background:linear-gradient(90deg,#05091c,#07103a,#05091c);border-bottom:1px solid var(--border2);height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:relative;}
#header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#1a4acf 20%,#2a6aef 50%,#1a4acf 80%,transparent);}
.kbs-badge{background:linear-gradient(135deg,#1a3a9a,#2a5fd4);color:#fff;padding:3px 7px;border-radius:3px;font-size:11px;font-weight:900;letter-spacing:1.5px;margin-right:9px;flex-shrink:0;}
#header-title{font-size:14px;font-weight:700;}
#header-title span{color:#5a8ff5;}
#header-sub{font-size:10px;color:var(--sub);margin-top:1px;}
#live-badge{display:none;align-items:center;gap:5px;background:rgba(220,30,30,.12);border:1px solid rgba(220,30,30,.4);border-radius:3px;padding:3px 7px;margin-left:10px;}
#live-badge.on{display:flex;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#dc1e1e;animation:pulse 1s infinite;}
.live-text{font-size:11px;font-weight:900;color:#ef4444;letter-spacing:1px;}
.hbtn{background:rgba(20,32,60,.9);border:1px solid var(--border2);color:var(--sub);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;}
.hbtn:hover{border-color:#2a4a8a;color:var(--text);}
.hbtn.live-on{background:rgba(220,30,30,.18);border-color:rgba(220,30,30,.5);color:#ef4444;}

/* ── TABS ── */
#election-tabs{background:#050812;border-bottom:1px solid var(--border);height:38px;flex-shrink:0;display:flex;align-items:stretch;padding:0 14px;gap:2px;overflow-x:auto;}
#election-tabs::-webkit-scrollbar{display:none;}
.etab{display:flex;align-items:center;gap:6px;padding:0 14px;cursor:pointer;border-bottom:2px solid transparent;font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap;transition:all .15s;flex-shrink:0;}
.etab:hover{color:var(--text);}.etab.active{color:#5a9ff5;border-bottom-color:#2a6aef;}
.tab-badge{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;}
.tab-badge.done{background:rgba(50,100,200,.15);border:1px solid rgba(50,100,200,.3);color:#6a9af5;}
.tab-badge.upcoming{background:rgba(60,60,80,.2);border:1px solid var(--border2);color:var(--dim);}

/* ── SUMMARY ── */
#summary-bar{background:#060810;border-bottom:1px solid var(--border);height:42px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:14px;}
.sb-label{font-size:11px;color:var(--dim);font-weight:600;flex-shrink:0;}
.sb-div{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
#seat-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;flex:1;max-width:200px;min-width:60px;}
.seat-seg{height:100%;transition:width .5s;}
#party-chips{display:flex;gap:12px;flex-wrap:nowrap;}
.pchip{display:flex;align-items:center;gap:5px;}
.pdot{width:9px;height:9px;border-radius:2px;}.pcnt{font-size:14px;font-weight:900;}.pname{font-size:11px;color:var(--sub);}
.sb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
#data-src-badge{font-size:10px;padding:2px 7px;border-radius:3px;display:none;}
#data-src-badge.builtin{display:block;background:rgba(60,120,60,.15);border:1px solid rgba(80,140,80,.3);color:#6aaa6a;}
#data-src-badge.mock{display:block;background:rgba(80,80,80,.1);border:1px solid var(--border2);color:var(--dim);}
#data-src-badge.api{display:block;background:rgba(18,89,195,.15);border:1px solid rgba(18,89,195,.35);color:#6b9cf5;}
#avg-rate-lbl{font-size:12px;color:var(--sub);}#avg-rate-lbl b{color:#8a9ab8;}
#err-msg{font-size:11px;color:#f4924a;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);padding:2px 8px;border-radius:3px;display:none;}
#err-msg.show{display:block;}

/* ── MAIN ── */
#main{flex:1;display:flex;overflow:hidden;}
#map-area{flex:1;position:relative;overflow:hidden;}
#map-svg{width:100%;height:100%;}
#map-svg path{transition:opacity .15s, fill .15s, stroke .15s;} 

/* ── 뒤로가기 네비게이션 ── */
#drill-nav{display:none;position:absolute;top:14px;left:14px;z-index:20;}
.btn-nav-back{background:rgba(18,89,195,.8);border:1px solid #2a6aef;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;backdrop-filter:blur(6px);transition:all .15s;box-shadow:0 4px 12px rgba(0,0,0,.5);}
.btn-nav-back:hover{background:#2a6aef;transform:translateY(-1px);}

/* ── 맵 툴바 ── */
#map-toolbar{position:absolute;bottom:14px;left:14px;z-index:15;display:flex;flex-direction:column;gap:6px;}
.map-tbtn{background:rgba(4,6,14,.92);border:1px solid var(--border2);color:var(--sub);padding:6px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;backdrop-filter:blur(6px);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.map-tbtn:hover{border-color:#2a4a8a;color:var(--text);}
.map-tbtn.on{background:rgba(18,89,195,.2);border-color:#2a5fd4;color:#6a9ff5;}
.tool-row{display:flex;gap:5px; align-items:center;}
#lbl-chk{display:none;}

/* 배경 투명도 슬라이더 커스텀 */
input[type=range] { -webkit-appearance: none; width: 80px; background: transparent; margin: 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #6a9ff5; cursor: pointer; margin-top: -4px; }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border2); border-radius: 2px; }

/* ── 로딩 ── */
#loading-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(4,6,14,0.9);backdrop-filter:blur(4px);z-index:100;}
.spinner{width:30px;height:30px;border:3px solid #1a2a40;border-top-color:#3a5ad4;border-radius:50%;animation:spin .7s linear infinite;}
#loading-txt{font-size:13px;color:var(--sub);font-weight:600;}

/* ── 메인 지도 툴팁 ── */
#tooltip{position:absolute;pointer-events:none;z-index:25;min-width:180px;background:rgba(4,6,14,.97);border:1px solid var(--border2);border-radius:7px;padding:11px 13px;display:none;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,.75);}
#tooltip.on{display:block;}

/* ── 범례 ── */
#legend{position:absolute;bottom:14px;right:14px;background:rgba(4,6,14,.92);border:1px solid var(--border);border-radius:6px;padding:8px 12px;backdrop-filter:blur(6px);z-index:10;}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.leg-row:last-child{margin-bottom:0;}.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}.leg-lbl{font-size:11px;color:var(--sub);}

/* ── 우측 패널 ── */
#right-panel{width:256px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#detail-area{padding:12px;border-bottom:1px solid var(--border);min-height:170px;}
#det-ph{color:var(--dim);font-size:12px;text-align:center;padding-top:24px;line-height:1.9;}
#det-ct{display:none;}
#det-name{font-size:13px;font-weight:700;margin-bottom:3px;}
#det-badge{display:inline-flex;align-items:center;border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700;margin-bottom:6px;}
.drw{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.drb{flex:1;background:#0c1220;border-radius:2px;height:4px;}
.drf{height:100%;border-radius:2px;transition:width .4s;}.drl{font-size:11px;color:var(--sub);flex-shrink:0;}
.dc{margin-bottom:7px;}.dc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;}
.dcb{background:#0c1220;border-radius:2px;height:3px;}.dcf{height:100%;border-radius:2px;transition:width .4s;}
.dcv{font-size:10px;color:var(--dim);margin-top:2px;}
#list-area{flex:1;overflow-y:auto;padding:5px;}
#list-hdr{font-size:11px;color:var(--dim);font-weight:600;padding:4px 8px 5px;}
.srow{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent;margin-bottom:1px;transition:background .1s;}
.srow:hover{background:rgba(10,16,30,.9);}.srow.active{background:rgba(20,36,80,.7);border-color:#2a3a6a;}
.sdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.sname{flex:1;font-size:12px;color:#a8b0c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srow.active .sname{color:var(--text);font-weight:700;}
.sparty{font-size:11px;font-weight:700;flex-shrink:0;}
.srate-wrap{width:36px;flex-shrink:0;}
.srn{font-size:9px;color:var(--dim);text-align:right;}
.srb{height:2px;background:#0c1220;border-radius:1px;margin-top:2px;}.srf{height:100%;border-radius:1px;}

/* ── 설정 모달 ── */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);align-items:center;justify-content:center;z-index:200;}
#settings-overlay.on{display:flex;}
#settings-modal{background:#0a0e1c;border:1px solid var(--border2);border-radius:9px;padding:22px;width:440px;max-width:95vw;box-shadow:0 28px 70px rgba(0,0,0,.9);max-height:90vh;overflow-y:auto;}
.m-title{font-size:15px;font-weight:700;margin-bottom:18px;}
.m-sec{font-size:10px;color:#4a6aaa;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.m-lbl{font-size:12px;color:var(--sub);font-weight:600;display:block;margin-bottom:5px;}
.m-input{width:100%;padding:8px 10px;border-radius:4px;background:#060810;border:1px solid var(--border2);color:var(--text);font-size:12px;outline:none;font-family:inherit;}
.m-input:focus{border-color:#2a4a8a;}
.m-hint{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5;}
.m-group{margin-bottom:13px;}
.tog-row{display:flex;gap:7px;}
.tbtn{flex:1;padding:8px;border-radius:4px;cursor:pointer;background:rgba(8,12,24,.9);border:1px solid var(--border2);color:var(--sub);font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;}
.tbtn.active{background:rgba(18,89,195,.3);border-color:#1259c3;color:#6b9cf5;}
.info-box{background:rgba(18,89,195,.08);border:1px solid rgba(18,89,195,.2);border-radius:4px;padding:9px 12px;font-size:11px;color:#6b9cf5;line-height:1.7;margin-bottom:12px;}
.warn-box{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:4px;padding:9px 12px;font-size:11px;color:#f4a060;line-height:1.7;margin-bottom:12px;}
.m-btns{display:flex;gap:7px;margin-top:6px;}
.btn-ok{flex:1;padding:10px;border-radius:4px;cursor:pointer;background:rgba(18,89,195,.3);border:1px solid #1259c3;color:#6b9cf5;font-size:13px;font-weight:700;font-family:inherit;}
.btn-cancel{padding:10px 16px;border-radius:4px;cursor:pointer;background:transparent;border:1px solid var(--border2);color:var(--sub);font-size:13px;font-family:inherit;}
.btn-sm{padding:7px 13px;border-radius:4px;cursor:pointer;background:rgba(18,89,195,.15);border:1px solid rgba(18,89,195,.3);color:#6b9cf5;font-size:12px;font-family:inherit;}
#cache-st{font-size:11px;color:var(--dim);margin-top:6px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#060810;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;min-width:0">
    <div class="kbs-badge">KBS</div>
    <div>
      <div id="header-title">전국동시지방선거 <span id="hd-year">개표현황</span></div>
      <div id="header-sub">광역단체장(시·도지사)</div>
    </div>
    <div id="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
    <div style="font-size:11px;color:var(--sub);text-align:right;flex-shrink:0"><b style="color:#8a9ab8;font-weight:600;display:block">마지막 갱신</b><span id="time-str">--:--:--</span></div>
    <button class="hbtn" id="btn-live" onclick="toggleLive()" style="display:none">▶ 실시간</button>

<div id="election-tabs"></div>

<div id="summary-bar">

  <div class="sb-div"></div>
  <div id="seat-bar"></div>
  <div id="party-chips"></div>
  <div class="sb-right">
    <div id="err-msg"></div>
    <div id="data-src-badge"></div>
    <div id="avg-rate-lbl">개표율 <b id="avg-rate-val">0.0%</b></div>
  </div>
</div>

<div id="main">
  <div id="map-area">
    <div id="loading-wrap"><div class="spinner"></div><div id="loading-txt">고해상도 지도 및 경계 조립 중...</div></div>
    
    <div id="drill-nav">
      <button class="btn-nav-back" onclick="drillUp()">⬅ 전국으로 돌아가기</button>
    </div>

    <svg id="map-svg"></svg>
    <div id="map-toolbar">
      <div class="tool-row map-tbtn" id="opacity-row" style="display:none; cursor:default;">
        <span style="font-size:11px; font-weight:700;">배경 밝기</span>
        <input type="range" id="bg-opacity" min="0" max="1" step="0.05" value="0.3" oninput="changeBgOpacity(this.value)">

      <div class="tool-row">

    <div id="detail-area">
      <div id="det-ph">⚙ 설정에서 선관위 API Key를 입력하고<br><strong style="color:var(--sub)">↻ API 버튼을 눌러<br>데이터를 불러오세요</strong></div>
      <div id="det-ct" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
          <div id="det-name" style="font-size:13px;font-weight:700"></div>
          <div id="det-ctx" style="font-size:10px;color:var(--dim);font-weight:600"></div>
        </div>
        <div id="det-badge"></div>
        <div class="drw"><div class="drb"><div class="drf" id="det-rf"></div></div><div class="drl">개표 <span id="det-rv">0%</span></div></div>
        <div id="det-cands"></div>
        <div id="det-sgg-summary" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)"></div>

</div>

<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div id="settings-modal">
    <div class="m-title">⚙ 설정</div>
    <div class="m-sec">📡 데이터 연동</div>
    <div class="m-group"><label class="m-lbl">모드 설정</label>
      <div class="tog-row">
        <button class="tbtn active" id="mode-mock" onclick="setMode('mock')">🔧 Mock 데모</button>
        <button class="tbtn" id="mode-real" onclick="setMode('real')">🌐 선관위 API</button>
      </div></div>
    <div id="real-s" style="display:none">
      <div class="m-group"><label class="m-lbl">공공데이터 API Key</label><input class="m-input" type="password" id="in-apikey" placeholder="투개표정보 API 키"></div>
    </div>
    <div class="m-group"><label class="m-lbl">SGIS 지도 연동</label>
      <input class="m-input" type="text" id="in-sgis-key" placeholder="SGIS Consumer Key" style="margin-bottom:5px">
      <input class="m-input" type="password" id="in-sgis-sec" placeholder="SGIS Consumer Secret">
    </div>
    <div class="m-group"><label class="m-lbl">CORS 프록시 URL</label><input class="m-input" type="text" id="in-proxy" placeholder="https://api.allorigins.win/raw?url="></div>
    <div class="m-group"><label class="m-lbl">폴링 간격</label>
      <div class="tog-row">
        <button class="tbtn" id="poll-10" onclick="setPoll(10)">10초</button>
        <button class="tbtn active" id="poll-30" onclick="setPoll(30)">30초</button>
        <button class="tbtn" id="poll-60" onclick="setPoll(60)">60초</button>
      </div></div>
    <div class="m-btns">
      <button class="btn-ok" onclick="saveSettings()">저장 및 적용</button>
      <button class="btn-sm" onclick="fetchSGISGeo(curEl().year)">🗺 현재 연도 지도 강제 갱신</button>
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
    </div>
    <div id="cache-st"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  IndexedDB 캐싱 (v6 버전으로 캐시 강제 무효화)
// ════════════════════════════════════════════
const DB_NAME = 'ElectionMapDB';
const STORE_NAME = 'geoStore';

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveGeoToCache(year, data) {
  try {
    const db = await initDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    // 캐시 키 v6로 강제 업데이트
    tx.objectStore(STORE_NAME).put(data, `geo_cache_v6_${year}`);
    return new Promise(res => { tx.oncomplete = () => res(true); tx.onerror = () => res(false); });
  } catch (e) { return false; }
}

async function loadGeoFromCache(year) {
  try {
    const db = await initDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(`geo_cache_v6_${year}`);
    return new Promise(res => { req.onsuccess = () => res(req.result); req.onerror = () => res(null); });
  } catch (e) { return null; }
}

// ════════════════════════════════════════════

const extractSggName=p=>p.SIGUNGU_NM||p.NAME_2||(p.adm_nm&&p.adm_cd&&String(p.adm_cd).length>=5?String(p.adm_nm).split(' ').pop():'')||'';

function getSidoNameFromProps(p){
  if(p.sidoName) return p.sidoName;
  if(p._sidoName) return p._sidoName;
  const sn = extractSidoName(p);
  if(sn) return sn;
  const raw = normName(getGeoName(p));
  return SIDO_ALL.find(s=>s===raw||s.includes(raw.replace(/시$|도$/,''))) || raw;
}

function getSggParty(sidoName,sggRawName,sgId){
  if(!sggRawName)return null;
  const tbl=D_SGG[sgId]?.[sidoName]||null;
  if(!tbl)return null;

  const stripAll = n => String(n).replace(/\s+/g, '').replace(/시$|구$|군$|읍$|면$/,'');
  const nm0 = String(sggRawName).trim().replace(/\s+/g, '');
  const nm1 = normSgg(sggRawName).replace(/\s+/g, '');
  
  for(const k of Object.keys(tbl)){
    const cleanK = k.replace(/\s+/g, '');
    if(cleanK === nm0 || cleanK === nm1) return tbl[k];
  }
  const baseName = stripAll(nm1 || nm0);
  for(const k of Object.keys(tbl)){
    const cleanK = k.replace(/\s+/g, '');
    if(stripAll(cleanK) === baseName) return tbl[k];
  }
  for(const k of Object.keys(tbl)){
    const cleanK = k.replace(/\s+/g, '');
    if(nm0.includes(cleanK) || cleanK.includes(nm0)) return tbl[k];
    if(nm1.includes(cleanK) || cleanK.includes(nm1)) return tbl[k];
  }
  return null;
}

function preprocessSggColors(sgId){
  if(!ST.sigunguGeo)return;
  const codeToSido=Object.fromEntries(Object.entries(SIDO_CODE).map(([k,v])=>[v,k]));
  
  ST.sigunguGeo.features.forEach(f=>{
    const p=f.properties;
    let sidoName=p.sidoName||p._sidoName||null;
    if(!sidoName){
      const cd=String(p.code||getGeoCode(p)||'');
      if(cd.length>=2){
        const prefix=cd.slice(0,2);
        sidoName=SIGUNGU_FILE_CODE[prefix]||codeToSido[prefix]||null;
      }
    }
    if(!sidoName&&p.sido){
      const sp=String(p.sido);
      sidoName=SIGUNGU_FILE_CODE[sp]||codeToSido[sp]||null;
    }
    
    let rawNm = String(p.name || p.adm_nm || p.SIGUNGU_NM || '').trim() || extractSggName(p);
    let party=null;
    const tbl=D_SGG[sgId]?.[sidoName]||null;
    if(tbl&&rawNm){
      party=getSggParty(sidoName, rawNm, sgId);
    }
    p._sidoName=sidoName;
    p._sggParty=party;
    p._sggColor=party?pc(party):(sidoName&&ST.data[sidoName]?pc(ST.data[sidoName].winner)+'cc':'#1a2030');
  });
}

async function tryFetch(url){try{const r=await fetch(url);if(r.ok)return await r.json();}catch{}return null;}

// ⚠️ 좌표 반올림 정밀도 1e6으로 상향 (틈새 최소화 보조 조치)
function utmk2wgs(x,y){const a=6378137,e2=0.00669438002290,dx=1000000,dy=2000000,lo=127.5*Math.PI/180,po=38*Math.PI/180;const px=x-dx,py=y-dy;const e4=e2*e2,e6=e4*e2;const M0=a*((1-e2/4-3*e4/64-5*e6/256)*po-(3*e2/8+3*e4/32+45*e6/1024)*Math.sin(2*po)+(15*e4/256+45*e6/1024)*Math.sin(4*po));const M=M0+py;const mu=M/(a*(1-e2/4-3*e4/64-5*e6/256));const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));const p=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);const sp=Math.sin(p),cp=Math.cos(p),tp=sp/cp;const N=a/Math.sqrt(1-e2*sp*sp),T=tp*tp,C=e2/(1-e2)*cp*cp;const R=a*(1-e2)/(1-e2*sp*sp)**1.5,D=px/N;const lat=p-(N*tp/R)*(D*D/2-(5+3*T+10*C-4*C*C)*D**4/24+(61+90*T+298*C+45*T*T)*D**6/720);const lon=lo+(D-(1+2*T+C)*D**3/6+(5-2*C+28*T)*D**5/120)/cp;return[Math.round(lon*180/Math.PI*1e6)/1e6,Math.round(lat*180/Math.PI*1e6)/1e6];}
function convC(c){if(!c)return c;if(typeof c[0]==='number'){const r=utmk2wgs(c[0],c[1]);return r;}return c.map(convC);}
function needConv(geo){try{let c=geo.features[0]?.geometry?.coordinates;while(Array.isArray(c[0]))c=c[0];return Math.abs(c[0])>500;}catch{return false;}}
function convGeo(geo){if(!needConv(geo))return geo;return{...geo,features:geo.features.map(f=>({...f,geometry:{...f.geometry,coordinates:convC(f.geometry.coordinates)}}))};}

function normGeo(geo){
  if(!geo||!geo.features)return geo;
  const _codeToSido=Object.fromEntries(Object.entries(SIDO_CODE).map(([k,v])=>[v,k]));
  return{...geo,features:geo.features.map(f=>{
    const p=f.properties;
    let nm=''; let code=getGeoCode(p); let _sido=p.sido||''; let _sidoName=null;

    const admCd=String(p.adm_cd||'').trim();
    const admNm=String(p.adm_nm||'').trim();

    if(admCd && admNm){
      code = admCd; nm = admNm;
      if(admCd.length<=2){ nm = normName(admNm) || admNm; _sido = admCd; }
      else if(admCd.length>=5){ _sido = admCd.slice(0,2); _sidoName = SIGUNGU_FILE_CODE[_sido]||_codeToSido[_sido]||null; }
    }else{
      if (p.SIDO_NM) nm = extractSidoName(p);
      else if (p.SIGUNGU_NM) nm = extractSggName(p);
      else nm = getGeoName(p);
      const sigCd=String(p.SIGUNGU_CD||p.sig_cd||p.SIG_CD||p.CD_SIGUNGU||'');
      if(sigCd.length>=2){
        _sido=sigCd.slice(0,2);
        _sidoName=SIGUNGU_FILE_CODE[_sido]||_codeToSido[_sido]||null;
      }else if(p.NAME_1){
        _sidoName=normName(p.NAME_1);
        _sido=SIDO_CODE[_sidoName]||'';
      }
    }
    return{...f,properties:{...p,name:nm,code,sido:_sido,sidoName:_sidoName}};
  })};
}

async function fetchSGISGeo(targetYear) {
  const loading = document.getElementById('loading-wrap');
  const txt = document.getElementById('loading-txt');
  if (loading) loading.style.display = 'flex';
  if (txt) txt.textContent = `고해상도 지도(SGIS) 다운로드 중...`;
  
  const st = document.getElementById('cache-st');
  try {
    const proxy = ST.proxyUrl.replace(/\/$/, '');
    const authUrl = `https://sgisapi.mods.go.kr/OpenAPI3/auth/authentication.json?consumer_key=${encodeURIComponent(ST.sgisKey)}&consumer_secret=${encodeURIComponent(ST.sgisSecret)}`;
    const ar = await fetch(`${proxy}?url=${encodeURIComponent(authUrl)}`);
    const ad = await ar.json();
    if (ad.errCd !== 0) throw new Error(ad.errMsg);
    const token = ad.result.accessToken;
    
    const maxSgisYear = 2023; 
    let apiYear = targetYear > maxSgisYear ? maxSgisYear : targetYear;

    const bUrl = (adm, ls, yr) => {
      const admParam = adm ? `&adm_cd=${encodeURIComponent(adm)}` : '';
      return `https://sgisapi.mods.go.kr/OpenAPI3/boundary/hadmarea.geojson?accessToken=${encodeURIComponent(token)}&year=${yr}${admParam}&low_search=${ls}`;
    };

    let simplifiedSidoF = null;
    let actualYear = apiYear;
    
    // 시도 코드를 알아내기 위해 단순 전국 지도를 받아옴 (단순 코드를 얻기 위한 용도)
    for (let yr = apiYear; yr >= 2010; yr--) {
      const r = await fetch(`${proxy}?url=${encodeURIComponent(bUrl('', 0, yr))}`);
      if (r.ok) {
        const d = await r.json();
        if ((d.errCd === 0 || d.errCd === undefined) && d.features?.length) {
          simplifiedSidoF = d.features;
          actualYear = yr;
          break;
        }
      }
    }
    if (!simplifiedSidoF) throw new Error(`${targetYear}년 지도 데이터 없음`);
    
    if (txt) txt.textContent = `고해상도 시군구 데이터 250개 병렬 다운로드 중...`;
    const sggAll = [];
    
    async function limitedFetch(tasks, limit) {
      let idx = 0;
      async function worker() {
        while (idx < tasks.length) await tasks[idx++]();
      }
      await Promise.all(Array.from({ length: Math.min(limit, tasks.length) }, worker));
    }

    const fetchTasks = simplifiedSidoF.map(sf => async () => {
      const code = String(sf.properties.adm_cd || '');
      try {
        const r2 = await fetch(`${proxy}?url=${encodeURIComponent(bUrl(code, 1, actualYear))}`);
        if (r2.ok) {
          const d2 = await r2.json();
          if (d2.features) {
            d2.features.forEach(ff => { 
              ff.properties.sido = code.slice(0, 2); 
              sggAll.push(ff); 
            });
          }
        }
      } catch(e) {}
    });

    await limitedFetch(fetchTasks, 5);

    const sigunguGeo = normGeo(convGeo({ type: 'FeatureCollection', features: sggAll }));
    
    const _codeToSido = Object.fromEntries(Object.entries(SIDO_CODE).map(([k,v])=>[v,k]));
    sigunguGeo.features.forEach(f => {
        if (!f.properties.sidoName && f.properties.sido) {
            f.properties.sidoName = SIGUNGU_FILE_CODE[f.properties.sido] || _codeToSido[f.properties.sido] || 'Unknown';
        }
    });

    if (txt) txt.textContent = `시군구 지도를 병합하여 완벽한 시도 외곽선 생성 중 (약 2~3초)...`;
    await new Promise(r => setTimeout(r, 100)); 

    let sidoGeo;
    try {
        const dissolvedGeo = turf.dissolve(sigunguGeo, {propertyName: 'sidoName'});
        dissolvedGeo.features.forEach(f => {
            f.properties.name = f.properties.sidoName;
            f.properties.adm_nm = f.properties.sidoName;
            const cd = Object.entries(SIDO_CODE).find(([k,v]) => k === f.properties.sidoName);
            if(cd) { f.properties.code = cd[1]; f.properties.adm_cd = cd[1]; }
        });
        sidoGeo = normGeo(dissolvedGeo);
        console.log(`[Turf] 시군구 병합 성공: ${sidoGeo.features.length}개 시도 폴리곤 생성`);
    } catch (e) {
        console.error("Turf dissolve error:", e);
        sidoGeo = normGeo(convGeo({ type: 'FeatureCollection', features: simplifiedSidoF }));
    }
    
    await saveGeoToCache(targetYear, { sido: sidoGeo, sigungu: sigunguGeo, ts: Date.now(), actualYear });
    
    ST.sidoGeo = sidoGeo; ST.sigunguGeo = sigunguGeo; ST.geoLoaded = true;
    if (st) st.textContent = `✅ ${targetYear}년 수학적 고해상도 지도 갱신 완료`;
    
    rebuildMap();
  } catch(e) { 
    if (st) st.textContent = `❌ SGIS 다운로드 실패: ${e.message}`; 
  } finally {
    if (loading) loading.style.display = 'none';
  }
}

async function loadGeo(year) {
  const loading = document.getElementById('loading-wrap');
  const txt = document.getElementById('loading-txt');
  loading.style.display = 'flex';
  txt.textContent = `${year}년 고해상도 캐시 지도 불러오는 중...`;
  
  try {
    const c = await loadGeoFromCache(year);
    if (c && c.sido && c.sigungu) {
      ST.sidoGeo = c.sido; ST.sigunguGeo = c.sigungu; ST.geoLoaded = true;
      rebuildMap();
      loading.style.display = 'none';
      return;
    }
  } catch(e) {}

  if (ST.sgisKey && ST.sgisSecret && ST.proxyUrl) {
    await fetchSGISGeo(year);
    return;
  }

  txt.textContent = `SGIS 연동이 안되어 기본 지도를 띄웁니다.`;
  for(const src of GEO_SRCS){
    const [sd,sg]=await Promise.all([tryFetch(src.sido),tryFetch(src.sigungu)]);
    if(sd&&sg){
      ST.sidoGeo=normGeo(convGeo(sd));ST.sigunguGeo=normGeo(convGeo(sg));
      ST.geoLoaded=true;
      rebuildMap();
      loading.style.display = 'none';
      return;
    }
  }
  txt.textContent = '지도 데이터가 없습니다. 설정에서 SGIS를 갱신해주세요.';
}

function rebuildMap() {
  _mapInitialized = false;
  d3.select('#map-svg').selectAll('*').remove();
  d3.select('#map-svg').on('.zoom', null);
  ST.currentTransform = d3.zoomIdentity;
  
  if (ST.sigunguGeo) preprocessSggColors(ST.currentSgId);
  initMapLayers();
  renderList();
  renderSummaryBar();
}

function initMapLayers(){
  if(_mapInitialized)return;
  const svgEl=document.getElementById('map-svg');
  const W=svgEl.clientWidth||700,H=svgEl.clientHeight||600;
  const svg=d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`);

  ST.zoomBehavior=d3.zoom().scaleExtent([1,20]).on('zoom',ev=>{
    ST.currentTransform=ev.transform;
    const k=ev.transform.k;
    svg.select('#map-g').attr('transform',ev.transform);
    
    // Zooming stroke-width updates
    svg.select('#sgg-layer').attr('stroke-width', 0.3 / k);
    svg.select('#sido-border-layer').attr('stroke-width', 1.2 / k);
    svg.select('#selected-outline-layer').attr('stroke-width', 1.4 / k);
    
    svg.selectAll('.sido-lbl,.sgg-lbl').attr('transform',function(d) {
      try {
        const ct=_path.centroid(d);
        let x = ct[0], y = ct[1];
        if (d3.select(this).classed('sido-lbl') && getSidoNameFromProps(d.properties) === '경기도') {
            x += 15; y += 25; 
        }
        return `translate(${x},${y}) scale(${1/k})`;
      } catch { return 'translate(0,0)'; }
    });
  });
  
  svg.call(ST.zoomBehavior);
  svg.on('dblclick.zoom',null);

  const g=svg.append('g').attr('id','map-g');
  
  // ⚠️ 레이어 순서 지정: SGG -> 전국 시도 외곽선 -> 드릴다운용 실시간 외곽선 -> 글자
  g.append('g').attr('id','sgg-layer').attr('stroke-linejoin', 'round').attr('stroke-width', 0.3);
  g.append('g').attr('id','sido-border-layer').attr('stroke-linejoin', 'round').attr('stroke-width', 1.2);
  g.append('g').attr('id','selected-outline-layer').attr('stroke-linejoin', 'round').attr('stroke-width', 1.4);
  g.append('g').attr('id','lbl-layer');

  _proj=d3.geoMercator().fitExtent([[18,18],[W-18,H-18]],ST.sidoGeo);
  _path=d3.geoPath().projection(_proj);

  // 1. 전국 250개 시군구를 전부 그림
  d3.select('#sgg-layer').selectAll('.sgg-path')
    .data(ST.sigunguGeo.features).join('path')
    .attr('class','sgg-path')
    .attr('d',_path)
    .style('cursor','pointer')
    .on('mouseover',function(ev,d){
      const sidoName=d.properties._sidoName;
      if(!ST.selectedSido) {
        d3.selectAll('.sgg-path').filter(f=>f.properties._sidoName===sidoName).attr('opacity',0.72);
        showMainTooltip(ev,sidoName,svgEl.clientWidth);
        showDetail(sidoName);
      } else {
        if (sidoName === ST.selectedSido) {
          d3.select(this).attr('opacity',0.75); 
          const rawNm=String(d.properties.name||d.properties.adm_nm||d.properties.SIGUNGU_NM||'').trim()||extractSggName(d.properties);
          const party=d.properties._sggParty||getSggParty(sidoName,rawNm,ST.currentSgId)||null;
          showSggTooltip(ev,rawNm,party,sidoName);
        } else {
          d3.selectAll('.sgg-path').filter(f=>f.properties._sidoName===sidoName).attr('opacity', ST.bgOpacity + 0.2);
          showMainTooltip(ev,sidoName,svgEl.clientWidth);
        }
      }
    })
    .on('mousemove',ev=>moveTooltip(ev,svgEl.clientWidth))
    .on('mouseout',function(ev,d){
      const sidoName=d.properties._sidoName;
      if(!ST.selectedSido) {
        d3.selectAll('.sgg-path').filter(f=>f.properties._sidoName===sidoName).attr('opacity', 1);
        clearDetail();
      } else {
        if (sidoName === ST.selectedSido) {
          d3.select(this).attr('opacity', 1);
        } else {
          d3.selectAll('.sgg-path').filter(f=>f.properties._sidoName===sidoName).attr('opacity', ST.bgOpacity);
          clearDetail();
        }
      }
      hideTooltip();
    })
    .on('click',(ev,d)=>{
      const sidoName=d.properties._sidoName;
      if(ST.selectedSido===sidoName) drillUp(); else drillDown(sidoName);
    });

  // 2. 🌟 Turf.js가 만든 무결점 시도 외곽선 렌더링
  d3.select('#sido-border-layer').selectAll('.sido-border')
    .data(ST.sidoGeo.features).join('path')
    .attr('class','sido-border')
    .attr('d',_path)
    .attr('fill','none')
    .attr('stroke','rgba(0,0,0,0.8)') // 굵고 명확한 시도 외곽선
    .attr('pointer-events','none');

  // 3. 레이블 (Sido)
  d3.select('#lbl-layer').selectAll('.sido-lbl')
    .data(ST.sidoGeo.features).join('text')
    .attr('class','sido-lbl')
    .attr('transform',function(d){
        const ct=_path.centroid(d);
        if (getSidoNameFromProps(d.properties)==='경기도') { ct[0]+=15; ct[1]+=25; }
        return `translate(${ct[0]},${ct[1]})`;
    })
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-family',"'Noto Sans KR',sans-serif")
    .attr('font-size',d=>getSidoNameFromProps(d.properties)==='경기도'?'13':'11')
    .attr('font-weight','700').attr('fill','rgba(255,255,255,.88)').attr('pointer-events','none')
    .text(d=>shortSido(getSidoNameFromProps(d.properties)));

  // 4. 레이블 (SGG)
  d3.select('#lbl-layer').selectAll('.sgg-lbl')
    .data(ST.sigunguGeo.features).join('text')
    .attr('class','sgg-lbl')
    .attr('transform',d=>{try{const ct=_path.centroid(d);return `translate(${ct[0]},${ct[1]})`;}catch{return 'translate(0,0)';}})
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-family',"'Noto Sans KR',sans-serif")
    .attr('font-size', '8')
    .attr('font-weight','600').attr('fill','rgba(255,255,255,.9)').attr('pointer-events','none')
    .attr('opacity', 0)
    .text(d=>{
        let raw = String(d.properties.name || d.properties.adm_nm || d.properties.SIGUNGU_NM || '').trim();
        let nm = raw.split(/\s+/).pop() || extractSggName(d.properties) || '';
        return nm.replace(/시$|구$|군$/,'').slice(0,4);
    });

  _mapInitialized=true;
  updateMapColors();
}

// ⚠️ 추가됨: 드릴다운 시 선택된 시도의 외곽선을 시군구 데이터 기반으로 Turf를 사용해 즉석에서 그림
function renderSelectedOutline() {
  const layer = d3.select('#selected-outline-layer');
  layer.selectAll('*').remove();

  if (!ST.selectedSido || !ST.sigunguGeo) return;

  const feats = ST.sigunguGeo.features.filter(
    f => f.properties._sidoName === ST.selectedSido
  );
  if (!feats.length) return;

  try {
    let merged = feats[0];
    for (let i = 1; i < feats.length; i++) {
      merged = turf.union(merged, feats[i]) || merged;
    }

    layer.append('path')
      .datum(merged)
      .attr('class', 'selected-outline')
      .attr('d', _path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(0,0,0,0.85)') // 드릴다운용 매우 선명한 검은 외곽선
      .attr('pointer-events', 'none');
  } catch(e) {
    console.warn('selected outline merge failed', e);
  }
}

function updateMapColors(){
  if(!_mapInitialized)return;
  
  d3.selectAll('.sgg-path')
    .attr('fill', d => {
      const sidoName = d.properties._sidoName;
      if (!ST.selectedSido) {
         const sido = ST.data[sidoName];
         return sido ? pc(sido.winner) : '#111a30';
      } else {
         if (sidoName === ST.selectedSido) {
            if (d.properties._sggColor && d.properties._sggColor !== '#1a2030') return d.properties._sggColor;
            const rawNm = String(d.properties.name || d.properties.adm_nm || d.properties.SIGUNGU_NM || '').trim() || extractSggName(d.properties);
            const party = getSggParty(sidoName, rawNm, ST.currentSgId);
            if (party) return pc(party);
            const sido = ST.data[sidoName];
            return sido ? pc(sido.winner) + '44' : '#1a2030';
         } else {
            const sido = ST.data[sidoName];
            return sido ? pc(sido.winner) : '#111a30';
         }
      }
    })
    .attr('stroke', d => {
      const sidoName = d.properties._sidoName;
      if (!ST.selectedSido) {
         return 'rgba(0,0,0,0.15)'; 
      } else {
         if (sidoName === ST.selectedSido) return 'rgba(0,0,0,0.4)'; 
         else return 'rgba(0,0,0,0.1)';
      }
    })
    .attr('opacity', d => {
      if (ST.selectedSido && d.properties._sidoName !== ST.selectedSido) return ST.bgOpacity;
      return 1;
    });

  // ⚠️ 줌인 시 전국 모드용 SIDO 테두리를 완전히 끔
  d3.selectAll('.sido-border').attr('opacity', d => {
     return ST.selectedSido ? 0 : 1; 
  });

  d3.selectAll('.sido-lbl').attr('opacity', d => {
    if (!ST.showLabels) return 0;
    return ST.selectedSido ? 0 : 1;
  });

  d3.selectAll('.sgg-lbl').attr('opacity', d => {
    if (!ST.showLabels) return 0;
    return (ST.selectedSido && d.properties._sidoName === ST.selectedSido) ? 1 : 0;
  });
  
  renderLegend();
}

function resizeMap(){
  if(!_mapInitialized)return;
  const svgEl=document.getElementById('map-svg');
  const W=svgEl.clientWidth||700,H=svgEl.clientHeight||600;
  d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`);
  _proj=d3.geoMercator().fitExtent([[18,18],[W-18,H-18]],ST.sidoGeo);
  _path=d3.geoPath().projection(_proj);
  
  d3.selectAll('.sgg-path').attr('d', _path);
  d3.selectAll('.sido-border').attr('d', _path);
  
  // 리사이즈 시 실시간 외곽선 재계산
  renderSelectedOutline();
  
  d3.selectAll('.sido-lbl').attr('transform',function(d){
      const ct=_path.centroid(d);
      let nm = getSidoNameFromProps(d.properties);
      if(nm === '경기도') { ct[0] += 15; ct[1] += 25; }
      return `translate(${ct[0]},${ct[1]})`;
  });
  d3.selectAll('.sgg-lbl').attr('transform',d=>{try{const ct=_path.centroid(d);return `translate(${ct[0]},${ct[1]})`;}catch{return 'translate(0,0)';}});
  
  if(ST.selectedSido&&ST.zoomBehavior){
    const t=_zoomToSido(ST.selectedSido);
    if(t)d3.select('#map-svg').call(ST.zoomBehavior.transform,t);
  }
}

function drillDown(sidoName){
  if(!_mapInitialized)return;
  ST.selectedSido=sidoName;

  document.getElementById('drill-nav').style.display='block';
  document.getElementById('opacity-row').style.display='flex';

  updateMapColors();
  
  // ⚠️ 드릴다운 시 선택된 시도의 외곽선을 동적으로 생성하여 렌더링
  renderSelectedOutline();

  const t=_zoomToSido(sidoName);
  if(t)d3.select('#map-svg').transition().duration(650).call(ST.zoomBehavior.transform,t);

  showDetail(sidoName);
  buildSggResultPanel(sidoName);
}

function _zoomToSido(sidoName){
  const feat=ST.sidoGeo?.features.find(f=>getSidoNameFromProps(f.properties)===sidoName);
  if(!feat||!ST.zoomBehavior||!_path)return;
  const svgEl=document.getElementById('map-svg');
  const W=svgEl.clientWidth||700,H=svgEl.clientHeight||600;
  try{
    const[[x0,y0],[x1,y1]]=_path.bounds(feat);
    const pw=x1-x0,ph=y1-y0;
    if(pw>0&&ph>0){
      const scale=Math.min(18,0.82/Math.max(pw/W,ph/H));
      const tx=W/2-scale*(x0+pw/2),ty=H/2-scale*(y0+ph/2);
      return d3.zoomIdentity.translate(tx,ty).scale(scale);
    }
  }catch(e){console.warn('[zoom]',e);}
  return null;
}

function drillUp(){
  if(!ST.selectedSido)return;
  ST.selectedSido=null;
  
  document.getElementById('drill-nav').style.display='none';
  document.getElementById('opacity-row').style.display='none';
  
  updateMapColors();
  
  // ⚠️ 드릴업 시 외곽선 지우기
  renderSelectedOutline();
  
  if(ST.zoomBehavior){
    d3.select('#map-svg').transition().duration(600).call(ST.zoomBehavior.transform,d3.zoomIdentity);
  }
  ST.currentTransform=d3.zoomIdentity;
  clearDetail();
  renderList();
}

function changeMapOpacity(val) {
  ST.bgOpacity = parseFloat(val);
  updateMapColors();
}

function buildSggResultPanel(sidoName){
  const sgId=ST.currentSgId;
  const sggData=D_SGG[sgId]?.[sidoName]||null;
  const hasFallback=!sggData&&D_SGG['20220601']?.[sidoName];
  const noSgg=NO_SGG.includes(sidoName);
  const listEl=document.getElementById('sido-list');
  if(noSgg){
    listEl.innerHTML='<div style="padding:10px 8px;font-size:11px;color:var(--dim)">기초단체장 선거 없음</div>';return;
  }
  if(!sggData){
    const yr=ELECTIONS.find(e=>e.sgId===sgId)?.year||sgId;
    const loadingMsg=ST.apiKey?`⏳ ${yr}년 시군구 결과 로딩 중...`:`${yr}년 기초단체장 데이터 없음`;
    listEl.innerHTML=`<div style="padding:10px 8px;font-size:11px;color:var(--dim)">${loadingMsg}<br><span style="color:${hasFallback?'#6a9af5':'var(--dim)'}">${hasFallback?'광역단체장 기준으로 색상 표시됨':'(광역단체장 기준 색상)'}</span></div>`;return;
  }
  const counts={};
  Object.entries(sggData).forEach(([,p])=>{counts[p]=(counts[p]||0)+1;});
  const shortNm=sidoName.replace(/특별자치도$|특별자치시$|특별시$|광역시$/,'');
  let html=`<div id="list-hdr" style="font-size:11px;color:var(--dim);font-weight:600;padding:4px 8px 5px">기초단체장 · ${shortNm}</div>`;
  html+=`<div style="display:flex;gap:5px;flex-wrap:wrap;padding:0 8px 8px">`;
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([p,n])=>{
    html+=`<span style="font-size:11px;padding:2px 7px;border-radius:3px;font-weight:700;background:${pc(p)}22;border:1px solid ${pc(p)}55;color:${pc(p)}">${ps(p)} ${n}</span>`;
  });
  html+=`</div>`;
  Object.entries(sggData).forEach(([nm,party])=>{
    const detail=ST.sggDetail?.[sgId]?.[sidoName]?.[nm];
    const top=detail?.cands?.[0];
    const pctStr=top?`${top.pct}%`:'';
    const candName=top?`${top.name}`:'';
    html+=`<div class="srow" style="cursor:default">
      <div class="sdot" style="background:${pc(party)}"></div>
      <div class="sname">${nm}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="sparty" style="color:${pc(party)}">${ps(party)}</span>
          <span style="font-size:10px;color:var(--dim)">${pctStr}</span>
        </div>
        ${candName?`<div style="font-size:10px;color:var(--sub);margin-top:1px">${candName}</div>`:''}
      </div>
    </div>`;
  });
  listEl.innerHTML=html;
}

function showMainTooltip(ev,nm,mapW){
  const d=ST.data[nm];if(!d)return;
  const tt=document.getElementById('tooltip');
  let h=`<div style="font-size:12px;font-weight:700;margin-bottom:4px">${nm} <span style="font-size:10px;color:var(--dim);font-weight:400">광역단체장</span></div>`;
  h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px"><div style="width:7px;height:7px;border-radius:2px;background:${pc(d.winner)}"></div><span style="font-size:12px;font-weight:700;color:${pc(d.winner)}">${d.winner}</span></div>`;
  h+=`<div style="font-size:10px;color:var(--sub);margin-bottom:6px">개표율 ${d.rate}%</div>`;
  d.cands.slice(0,3).forEach((c,i)=>{h+=`<div style="margin-bottom:4px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:${i===0?'var(--text)':'var(--sub)'}">${c.name}</span><span style="color:${pc(c.party)};font-weight:700">${c.pct}%</span></div><div style="background:#0c1220;height:2px;border-radius:1px"><div style="width:${c.pct}%;height:100%;background:${pc(c.party)};opacity:${i===0?1:.4};border-radius:1px"></div></div></div>`;});
  tt.innerHTML=h;tt.classList.add('on');moveTooltip(ev,mapW);
}

function showSggTooltip(ev,sggName,party,sidoName){
  const tt=document.getElementById('tooltip');
  let h=`<div style="font-size:12px;font-weight:700;margin-bottom:4px">${sggName}</div>`;
  if(party){
    h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
      <div style="width:7px;height:7px;border-radius:2px;background:${pc(party)}"></div>
      <span style="font-size:11px;font-weight:700;color:${pc(party)}">${party}</span>
    </div>`;
    const detail=ST.sggDetail?.[ST.currentSgId]?.[sidoName];
    const cleanSgg = sggName.replace(/\s+/g, '');
    let d = null;
    if(detail) {
      const matchKey = Object.keys(detail).find(k => k.replace(/\s+/g,'') === cleanSgg || k.replace(/\s+/g,'').includes(cleanSgg) || cleanSgg.includes(k.replace(/\s+/g,'')));
      d = detail[matchKey];
    }
    
    if(d?.cands){
      d.cands.slice(0,3).forEach((c,i)=>{
        h+=`<div style="margin-bottom:3px">
          <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px">
            <span style="color:${i===0?'var(--text)':'var(--sub)'}">${c.name}</span>
            <span style="color:${pc(c.party)};font-weight:700">${c.pct}%</span>
          </div>
          <div style="background:#0c1220;height:2px;border-radius:1px">
            <div style="width:${Math.min(c.pct,100)}%;height:100%;background:${pc(c.party)};opacity:${i===0?1:.4};border-radius:1px"></div>
          </div></div>`;
      });
    }else{
      h+=`<div style="font-size:10px;color:var(--dim);margin-top:3px">기초단체장</div>`;
    }
  }else{
    h+='<div style="font-size:11px;color:var(--sub)">집계 중</div>';
  }
  tt.innerHTML=h;tt.classList.add('on');
  moveTooltip(ev,document.getElementById('map-svg').clientWidth);
}

function moveTooltip(ev,mapW){
  const tt=document.getElementById('tooltip');if(!tt.classList.contains('on'))return;
  const r=document.getElementById('map-area').getBoundingClientRect();
  const x=ev.clientX-r.left,y=ev.clientY-r.top;
  const tw=tt.offsetWidth+12;
  tt.style.left=(x+tw>mapW?x-tw:x+12)+'px';
  tt.style.top=Math.min(y-10,r.height-160)+'px';
}
function hideTooltip(){document.getElementById('tooltip').classList.remove('on');}

function showDetail(name){
  const d=ST.data[name];if(!d)return;
  document.getElementById('det-ph').style.display='none';
  document.getElementById('det-ct').style.display='block';
  document.getElementById('det-name').textContent=name;
  const col=pc(d.winner);
  const b=document.getElementById('det-badge');
  const status=d.status||(d.rate===100?'final':d.rate!=null?'counting':'unknown');
  const badgeText=status==='final'?`${d.winner} 당선`:status==='counting'?`${d.winner} 선두`:`집계 중`;
  b.style.cssText=`background:${col}22;border:1px solid ${col}66;color:${col}`;
  b.textContent=badgeText;
  
  const ctxEl=document.getElementById('det-ctx');
  if(ctxEl)ctxEl.textContent=ST.selectedSido?'광역단체장':'광역단체장';
  
  const rateStr=d.rate!=null?`${typeof d.rate==='number'?d.rate.toFixed(1):d.rate}%`:'집계 중';
  const ratePct=d.rate!=null?Math.min(100,Math.max(0,d.rate)):0;
  document.getElementById('det-rf').style.cssText=`width:${ratePct}%;background:${col}`;
  document.getElementById('det-rv').textContent=rateStr;
  
  document.getElementById('det-cands').innerHTML=(d.cands||[]).map((c2,i)=>{
    const pct=typeof c2.pct==='number'&&!isNaN(c2.pct)?c2.pct:0;
    return `<div class="dc"><div class="dc-row"><span style="color:${i===0?'var(--text)':'var(--sub)'};font-weight:${i===0?700:400}">${c2.name} <span style="color:${pc(c2.party)};font-size:10px">${ps(c2.party)}</span></span><span style="font-weight:700;color:${pc(c2.party)}">${pct}%</span></div><div class="dcb"><div class="dcf" style="width:${pct}%;background:${pc(c2.party)};opacity:${i===0?1:.4}"></div></div><div class="dcv">${fmt(c2.votes)}표</div></div>`;
  }).join('');
  
  const sggSumEl=document.getElementById('det-sgg-summary');
  if(sggSumEl){
    if(ST.selectedSido&&ST.selectedSido===name){
      const sggData=D_SGG[ST.currentSgId]?.[name]||null;
      if(sggData){
        const counts={};
        Object.entries(sggData).forEach(([,p])=>{counts[p]=(counts[p]||0)+1;});
        sggSumEl.innerHTML=`<div style="font-size:10px;color:var(--dim);font-weight:600;margin-bottom:5px">기초단체장</div>`
          +Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([p,n])=>
            `<span style="font-size:11px;padding:1px 6px;border-radius:2px;font-weight:700;margin-right:4px;background:${pc(p)}22;border:1px solid ${pc(p)}55;color:${pc(p)}">${ps(p)} ${n}</span>`
          ).join('');
        sggSumEl.style.display='block';
      }else{sggSumEl.style.display='none';}
    }else{sggSumEl.style.display='none';}
  }
}
function clearDetail(){document.getElementById('det-ph').style.display='block';document.getElementById('det-ct').style.display='none';}

function renderSummaryBar(){
  const valid=SIDO_ALL.filter(s=>ST.data[s]);
  const cnt={};valid.forEach(s=>{const w=ST.data[s].winner;cnt[w]=(cnt[w]||0)+1;});
  const tot=valid.length;const srt=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  document.getElementById('sb-lbl').textContent=`광역단체장 ${tot}석`;
  document.getElementById('seat-bar').innerHTML=srt.map(([p,n])=>`<div class="seat-seg" style="width:${n/tot*100}%;background:${pc(p)}"></div>`).join('');
  document.getElementById('party-chips').innerHTML=srt.map(([p,n])=>`<div class="pchip"><div class="pdot" style="background:${pc(p)}"></div><span class="pcnt" style="color:${pc(p)}">${n}</span><span class="pname">${ps(p)}</span></div>`).join('');
  const avg=valid.reduce((s,k)=>s+(ST.data[k]?.rate||0),0)/valid.length;
  document.getElementById('avg-rate-val').textContent=valid.length?avg.toFixed(1)+'%':'0.0%';
}
function renderList(){
  document.getElementById('sido-list').innerHTML=SIDO_ALL.map(nm=>{
    const d=ST.data[nm];
    if(!d)return`<div class="srow" style="opacity:.2;pointer-events:none"><div class="sdot" style="background:#333"></div><div class="sname">${shortSido(nm)}</div></div>`;
    const c=pc(d.winner);
    return`<div class="srow" id="sr-${nm}" onclick="drillDown('${nm}')"><div class="sdot" style="background:${c}"></div><div class="sname">${shortSido(nm)}</div><div class="sparty" style="color:${c}">${ps(d.winner)}</div><div class="srate-wrap"><div class="srn">${typeof d.rate==='number'?d.rate.toFixed?d.rate.toFixed(0):d.rate:d.rate}%</div><div class="srb"><div class="srf" style="width:${d.rate}%;background:${c};opacity:.5"></div></div></div></div>`;
  }).join('');
}
function renderLegend(){
  const cnt={};SIDO_ALL.filter(s=>ST.data[s]).forEach(s=>{const w=ST.data[s].winner;cnt[w]=(cnt[w]||0)+1;});
  document.getElementById('legend').innerHTML=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([p])=>`<div class="leg-row"><div class="leg-dot" style="background:${pc(p)}"></div><span class="leg-lbl">${PDB[p]?.short??p}</span></div>`).join('');
}
function toggleLabels(v){
  ST.showLabels=v;
  document.getElementById('lbl-btn').classList.toggle('on',v);
  updateMapColors(); 
}
function exportMapPNG(withLabels){
  const svgEl=document.getElementById('map-svg');
  const SCALE=2; 
  const W=svgEl.clientWidth,H=svgEl.clientHeight;
  const CW=W*SCALE,CH=H*SCALE;

  const clone=svgEl.cloneNode(true);
  clone.setAttribute('width',CW);
  clone.setAttribute('height',CH);
  clone.setAttribute('viewBox',`0 0 ${W} ${H}`);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.style.background='transparent';

  const g=clone.querySelector('#map-g');
  if(g&&ST.currentTransform){
    const t=ST.currentTransform;
    g.setAttribute('transform',`translate(${t.x},${t.y}) scale(${t.k})`);
    
    const sggL = clone.querySelector('#sgg-layer');
    if (sggL) sggL.setAttribute('stroke-width', 0.3 / t.k);
    const sidoL = clone.querySelector('#sido-border-layer');
    if (sidoL) sidoL.setAttribute('stroke-width', 1.2 / t.k);
    const outL = clone.querySelector('#selected-outline-layer');
    if (outL) outL.setAttribute('stroke-width', 1.4 / t.k);
    
    clone.querySelectorAll('.sido-lbl,.sgg-lbl').forEach(txt=>{
      const fs=parseFloat(txt.getAttribute('font-size')||'11');
      txt.setAttribute('font-size',Math.max(3,fs/t.k));
    });
  }

  if(!withLabels) clone.querySelectorAll('.sido-lbl,.sgg-lbl').forEach(e=>e.remove());
  else clone.querySelectorAll('text').forEach(t=>t.setAttribute('font-family',"Pretendard,'Apple SD Gothic Neo','Malgun Gothic','나눔고딕',sans-serif"));

  const svgStr=new XMLSerializer().serializeToString(clone);
  const url=URL.createObjectURL(new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}));
  const img=new Image();
  img.onload=()=>{
    const cv=document.createElement('canvas');
    cv.width=CW;cv.height=CH;
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,CW,CH);
    ctx.drawImage(img,0,0,CW,CH);
    const a=document.createElement('a');
    const suffix=ST.selectedSido?`_${ST.selectedSido.replace(/특별자치도$|특별자치시$|특별시$|광역시$/,'')}`:'_전국';
    a.download=`election_${curEl().year}${suffix}_${withLabels?'글자':'지도만'}.png`;
    a.href=cv.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

function renderTabs(){
  document.getElementById('election-tabs').innerHTML=ELECTIONS.map(e=>`<div class="etab${e.sgId===ST.currentSgId?' active':''}" onclick="switchElection('${e.sgId}')"><span class="tab-year">${e.year}</span> <span style="font-size:10px;opacity:.6">${e.round}</span> <span class="tab-badge ${e.status==='upcoming'?'upcoming':'done'}">${e.status==='upcoming'?'예정':'확정'}</span></div>`).join('');
}

async function switchElection(sgId){
  if(ST.isLive)toggleLive();
  stopPolling();
  if(ST.selectedSido) drillUp();
  
  ST.currentSgId=sgId;
  const targetYear = curEl().year;

  if(!ST._loaded){ST._loaded={};}
  if(ST._loaded[sgId]){
    ST.data=ST._loaded[sgId];
    ST.dataSource='api';
  }else{
    ST.data={};
    ST.dataSource='none';
  }
  renderTabs();updateHeader();clearDetail();
  await loadGeo(targetYear);
}

function updateHeader(){
  const el=curEl();
  document.getElementById('hd-year').textContent=`${el.year} 개표현황`;
  document.getElementById('header-sub').textContent=`${el.round} · ${el.date} · 광역단체장(시·도지사)`;
  document.getElementById('btn-live').style.display=isUpcoming()?'block':'none';
  document.getElementById('btn-fetch').style.display=ST.apiKey?'block':'none';
  const b=document.getElementById('data-src-badge');
  b.className=ST.dataSource;
  if(ST.dataSource==='api')       {b.className='api';b.textContent='선관위 API';}
  else if(ST.dataSource==='mock') {b.className='mock';b.textContent='MOCK 데이터';}
  else                            {b.className='none';b.textContent='데이터 없음 — ↻ API 버튼 클릭';}
}

function toggleLive(){
  if(!isUpcoming())return;
  ST.isLive=!ST.isLive;
  const btn=document.getElementById('btn-live');
  document.getElementById('live-badge').classList.toggle('on',ST.isLive);
  btn.classList.toggle('live-on',ST.isLive);
  btn.textContent=ST.isLive?'■ 중지':'▶ 실시간';
  if(ST.isLive){poll();ST.pollTimer=setInterval(poll,ST.pollSec*1000);}else stopPolling();
}
function stopPolling(){if(ST.pollTimer){clearInterval(ST.pollTimer);ST.pollTimer=null;}}
async function poll(){
  if(ST.mode==='mock'){
    let ch=false;
    SIDO_ALL.forEach(k=>{
      const d=ST.data[k];
      if(d&&(d.rate==null||d.rate<100)){
        d.rate=Math.min(100,+((d.rate||0)+Math.random()*3.5).toFixed(1));
        d.status=d.rate>=100?'final':'counting';
        ch=true;
      }
    });
    if(ch){updateMapColors();renderSummaryBar();renderList();}
  }else{
    if(!ST.apiKey) return;
    await fetchAllSidoAPI(ST.currentSgId);
  }
}

async function fetchHistorical(){
  if(!ST.apiKey){alert('설정 ⚙ 에서 선관위 API Key를 입력하세요');openSettings();return;}
  const btn=document.getElementById('btn-fetch');btn.textContent='...';btn.disabled=true;
  try{
    await fetchAllSidoAPI(ST.currentSgId);
    ST.dataSource='api';
    updateHeader();
    const sggEl=document.getElementById('err-msg');
    if(sggEl){sggEl.textContent='시군구 개표 결과 로딩 중...';sggEl.classList.add('show');}
    await fetchAllSggAPI(ST.currentSgId);
    if(sggEl)setTimeout(()=>sggEl.classList.remove('show'),2000);
  }finally{
    btn.textContent='↻ API';btn.disabled=false;
  }
}

const NEC_SIDO_NAMES={
  '강원특별자치도':['강원특별자치도','강원도'],
  '전북특별자치도':['전북특별자치도','전라북도'],
  '제주특별자치도':['제주특별자치도','제주도'],
};

async function _necFetch(necUrl){
  const url=ST.proxyUrl ? ST.proxyUrl.replace(/\/$/,'')+`?url=${encodeURIComponent(necUrl)}` : necUrl;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const j=await r.json();
  const items=j?.response?.body?.items?.item??j?.body?.items?.item;
  return Array.isArray(items)?items:(items?[items]:null);
}

async function fetchOneSido(sgId,nm){
  const nameList=NEC_SIDO_NAMES[nm]||[nm];
  let arr=null;
  for(const sdName of nameList){
    const necUrl=`https://apis.data.go.kr/9760000/VoteXmntckInfoInqireService2/getXmntckSttusInfoInqire`
      +`?serviceKey=${encodeURIComponent(ST.apiKey)}&sgId=${sgId}&sgTypecode=3`
      +`&sdName=${encodeURIComponent(sdName)}&numOfRows=50&pageNo=1&resultType=json`;
    try{
      arr=await _necFetch(necUrl);
      if(arr&&arr.length)break;
    }catch(e){}
  }
  if(!arr||!arr.length)return null;

  const row=arr.find(it=>!it.wiwName||it.wiwName===nm||it.wiwName==='')||arr[0];
  const cands=[];
  const yutusu=parseInt(row.yutusu||0);  
  const tusu=parseInt(row.tusu||0);       
  const sunsu=parseInt(row.sunsu||0);     
  const tv=yutusu||tusu||1;

  for(let i=1;i<=50;i++){
    const x=String(i).padStart(2,'0');
    const party=row[`jd${x}`];
    const name=row[`hbj${x}`];
    const votes=parseInt(row[`dugsu${x}`]||0);
    if(!name&&!votes)break;
    if(isNaN(votes)||votes<0)continue;
    cands.push({name:String(name||'').trim(),party:String(party||'무소속').trim(), votes,pct:+(votes/tv*100).toFixed(1)});
  }
  cands.sort((a,b)=>b.votes-a.votes);
  if(!cands.length)return null;

  const totalDugsu=cands.reduce((s,c)=>s+c.votes,0);
  let rate=null;
  if(yutusu>0&&totalDugsu>0){
    if(Math.abs(totalDugsu-yutusu)/yutusu<0.01) rate=100;  
    else rate=Math.min(99.9,+(totalDugsu/yutusu*100).toFixed(1));
  }
  const status=rate===100?'final':rate!==null?'counting':'unknown';
  return{winner:cands[0].party,rate,status,cands, meta:{yutusu,tusu,sunsu}};  
}

async function fetchAllSidoAPI(sgId){
  const errEl=document.getElementById('err-msg');
  errEl.classList.remove('show');
  
  let done=0,success=0;
  const failed=[];

  const tasks=SIDO_ALL.map(nm=>async()=>{
    try{
      const r=await fetchOneSido(sgId,nm);
      if(r){ST.data[nm]=r;success++;}
    }catch(err){ failed.push(shortSido(nm)); }
    finally{
      done++;
      if(success>0&&_mapInitialized)updateMapColors();
      errEl.textContent=`${done}/${SIDO_ALL.length} 갱신 중${failed.length?` (실패: ${failed.join(', ')})` :''}`;
      errEl.classList.add('show');
    }
  });

  let idx = 0;
  const workers = Array.from({length: 5}, async () => {
      while (idx < tasks.length) await tasks[idx++]();
  });
  await Promise.all(workers);

  if(success>0){
    if(!ST._loaded)ST._loaded={};
    ST._loaded[sgId]=JSON.parse(JSON.stringify(ST.data));
    ST.dataSource='api';
    updateHeader();
    preprocessSggColors(sgId);
    
    if(ST.sigunguGeo) preprocessSggColors(ST.currentSgId);
    updateMapColors();
    renderList();
    renderSummaryBar();
    
    fetchAllSggAPI(sgId).catch(()=>{});
    errEl.textContent=failed.length ?`${success}/${SIDO_ALL.length} 완료, 실패: ${failed.join(', ')}`:`✅ API 갱신 완료`;
    setTimeout(()=>errEl.classList.remove('show'),4000);
  }else{
    errEl.textContent='⚠ API 호출 실패 — 키를 확인하세요';
    errEl.classList.add('show');
  }
}

async function _necFetchAll(baseUrl){
  const first=await _necFetch(baseUrl+'&pageNo=1');
  if(!first||!first.length)return first;
  const url=ST.proxyUrl ? ST.proxyUrl.replace(/\/$/,'')+`?url=${encodeURIComponent(baseUrl+'&pageNo=1')}` : baseUrl+'&pageNo=1';
  const r=await fetch(url);
  const j=await r.json();
  const totalCount=parseInt(j?.response?.body?.totalCount||j?.body?.totalCount||first.length);
  const numOfRows=100;
  if(totalCount<=numOfRows)return first;
  const pages=Math.ceil(totalCount/numOfRows);
  const extras=await Promise.all(Array.from({length:pages-1},(_,i)=>_necFetch(baseUrl+`&pageNo=${i+2}`).catch(()=>null)));
  const all=[...first];
  extras.forEach(e=>{if(e)all.push(...e);});
  return all;
}

async function fetchSggBySido(sgId,sidoNm){
  const nameList=NEC_SIDO_NAMES[sidoNm]||[sidoNm];
  let arr=null;
  for(const sdName of nameList){
    const baseUrl=`https://apis.data.go.kr/9760000/VoteXmntckInfoInqireService2/getXmntckSttusInfoInqire`
      +`?serviceKey=${encodeURIComponent(ST.apiKey)}&sgId=${sgId}&sgTypecode=4`
      +`&sdName=${encodeURIComponent(sdName)}&numOfRows=100&resultType=json`;
    try{
      const rows=await _necFetchAll(baseUrl);
      if(rows&&rows.length){ arr=rows; break; }
    }catch(e){}
  }
  if(!arr||!arr.length)return null;

  const result={};   
  const detail={};   
  for(const row of arr){
    const wiwName=String(row.wiwName||'').trim();
    if(!wiwName)continue;
    const yutusu=parseInt(row.yutusu||0)||parseInt(row.tusu||0)||1;
    const cands=[];
    for(let i=1;i<=50;i++){
      const x=String(i).padStart(2,'0');
      const nm=String(row[`hbj${x}`]||'').trim();
      const votes=parseInt(row[`dugsu${x}`]||0);
      if(!nm&&!votes)break;
      if(!isNaN(votes)&&votes>=0)
        cands.push({name:nm,party:String(row[`jd${x}`]||'무소속').trim(), votes,pct:+(votes/yutusu*100).toFixed(1)});
    }
    cands.sort((a,b)=>b.votes-a.votes);
    if(cands.length){
      result[wiwName]=cands[0].party;
      detail[wiwName]={winner:cands[0].party,cands};
    }
  }
  if(Object.keys(result).length===0)return null;
  if(!ST.sggDetail)ST.sggDetail={};
  if(!ST.sggDetail[sgId])ST.sggDetail[sgId]={};
  ST.sggDetail[sgId][sidoNm]=detail;

  return result;
}

async function fetchAllSggAPI(sgId){
  if(!ST.apiKey)return;
  if(!D_SGG[sgId])D_SGG[sgId]={};

  let done=0,success=0;
  const tasks=SIDO_ALL.map(sidoNm=>async()=>{
    try{
      const sggMap=await fetchSggBySido(sgId,sidoNm);
      if(sggMap&&Object.keys(sggMap).length){
        D_SGG[sgId][sidoNm]=sggMap;
        success++;
        if(ST.selectedSido===sidoNm){
          preprocessSggColors(sgId); updateMapColors(); buildSggResultPanel(sidoNm);
        }
      }
    }catch(e){}
    finally{done++;}
  });

  let idx = 0;
  const workers = Array.from({length: 5}, async () => {
      while (idx < tasks.length) await tasks[idx++]();
  });
  await Promise.all(workers);

  if(success>0){
    preprocessSggColors(sgId);
    if(ST.selectedSido){ updateMapColors(); buildSggResultPanel(ST.selectedSido); }
  }
}

async function openSettings(){
  ST.sgisKey=localStorage.getItem('el_sgis_key')||'';
  ST.sgisSecret=localStorage.getItem('el_sgis_secret')||'';
  ST.apiKey=localStorage.getItem('el_apikey')||'';
  ST.proxyUrl=localStorage.getItem('el_proxy')||'';
  document.getElementById('in-sgis-key').value=ST.sgisKey;
  document.getElementById('in-sgis-sec').value=ST.sgisSecret;
  document.getElementById('in-proxy').value=ST.proxyUrl;
  document.getElementById('in-apikey').value=ST.apiKey;
  setMode(ST.mode,false);setPoll(ST.pollSec,false);
  
  const targetYear = curEl().year;
  const c = await loadGeoFromCache(targetYear);
  document.getElementById('cache-st').textContent = c?.ts 
    ? `데이터베이스 캐시: ${targetYear}년 지도(${Math.round((Date.now()-c.ts)/3600000)}시간 전)`
    : `${targetYear}년 캐시 없음 (SGIS 지도 갱신 필요)`;
    
  document.getElementById('settings-overlay').classList.add('on');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('on');}
function saveSettings(){
  const sk=document.getElementById('in-sgis-key').value.trim();
  const ss=document.getElementById('in-sgis-sec').value.trim();
  const proxy=document.getElementById('in-proxy').value.trim();
  const ak=document.getElementById('in-apikey').value.trim();
  if(sk){ST.sgisKey=sk;localStorage.setItem('el_sgis_key',sk);}
  if(ss){ST.sgisSecret=ss;localStorage.setItem('el_sgis_secret',ss);}
  if(proxy){ST.proxyUrl=proxy;localStorage.setItem('el_proxy',proxy);}
  if(ak){ST.apiKey=ak;localStorage.setItem('el_apikey',ak);}
  localStorage.setItem('el_mode',ST.mode);localStorage.setItem('el_poll',ST.pollSec);
  updateHeader();closeSettings();
}
function setMode(m,save=true){ST.mode=m;document.getElementById('mode-mock').classList.toggle('active',m==='mock');document.getElementById('mode-real').classList.toggle('active',m==='real');document.getElementById('real-s').style.display=m==='real'?'block':'none';}
function setPoll(s){
  ST.pollSec=s;
  [10,30,60].forEach(n=>document.getElementById(`poll-${n}`)?.classList.toggle('active',n===s));
  if(ST.isLive){stopPolling();ST.pollTimer=setInterval(poll,ST.pollSec*1000);}
}
